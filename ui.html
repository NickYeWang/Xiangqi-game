<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick的中国象棋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: STKaiti, KaiTi, "Microsoft YaHei", sans-serif;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            overflow-x: hidden;
        }
        
        /* 首页样式 */
        .landing-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #2c1810 0%, #4a2c1a 30%, #8b4513 60%, #d4a574 100%);
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 80px;
            background: linear-gradient(145deg, rgba(139,69,19,0.95), rgba(101,67,33,0.95));
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 4px #8b4513, 0 0 0 8px #d4a574;
            border: 2px solid #d4a574;
        }
        
        .main-title {
            font-size: 72px;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5), 4px 4px 8px rgba(0,0,0,0.5);
            letter-spacing: 20px;
        }
        
        .sub-title {
            font-size: 24px;
            color: #d4a574;
            letter-spacing: 12px;
            margin-top: 15px;
        }
        
        .welcome-text {
            font-size: 28px;
            color: #d4a574;
            margin-bottom: 50px;
            font-weight: 600;
            letter-spacing: 8px;
        }
        
        .mode-selection {
            display: flex;
            gap: 80px;
            margin-bottom: 50px;
        }
        
        .mode-card {
            width: 300px;
            height: 400px;
            background: linear-gradient(145deg, #f5deb3, #d2b48c);
            border-radius: 20px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .mode-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 30px rgba(255,215,0,0.3);
            border-color: #ffd700;
        }
        
        .mode-card.selected {
            border-color: #ffd700;
            box-shadow: 0 0 40px rgba(255,215,0,0.6);
            transform: translateY(-20px) scale(1.05);
        }
        
        .mode-card.selected::after {
            content: '✓ 已选择';
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(145deg, #ffd700, #daa520);
            color: #8b4513;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .click-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #8b4513;
            background: rgba(255,215,0,0.9);
            padding: 8px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .mode-card:hover .click-hint,
        .mode-card.selected .click-hint {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }
        
        .mode-icon {
            width: 130px;
            height: 130px;
            background: linear-gradient(145deg, #8b4513, #654321);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            font-size: 65px;
            border: 4px solid #d4a574;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .mode-card h3 {
            font-size: 32px;
            color: #8b4513;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .mode-card p {
            font-size: 18px;
            color: #654321;
            text-align: center;
            line-height: 1.8;
        }
        
        .selection-hint {
            font-size: 26px;
            color: #ffd700;
            font-weight: 600;
            margin: 30px 0;
            padding: 18px 50px;
            background: rgba(139,69,19,0.6);
            border-radius: 35px;
            border: 2px dashed #d4a574;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }
        
        .selection-hint.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .enter-btn {
            padding: 22px 100px;
            font-size: 30px;
            background: linear-gradient(145deg, #ffd700, #daa520);
            color: #8b4513;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 12px;
            box-shadow: 0 10px 30px rgba(218,165,32,0.5);
            transition: all 0.3s ease;
        }
        
        .enter-btn:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(218,165,32,0.6);
        }
        
        .enter-btn:disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
        }

        /* 游戏界面 */
        .game-container {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(to bottom, #2c1810, #4a2c1a);
        }
        
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            background: rgba(245,222,179,0.95);
            border-radius: 15px;
            border: 3px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .player-info.active {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.6);
        }
        
        .player-color {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid #333;
        }
        
        .player-color.red { 
            background: radial-gradient(circle at 30% 30%, #ff6666, #cc0000);
        }
        .player-color.black { 
            background: radial-gradient(circle at 30% 30%, #666, #000);
        }
        
        .player-info span { 
            font-size: 20px; 
            font-weight: 700; 
            color: #333; 
        }
        
        select, button {
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #8b4513;
            font-family: inherit;
            cursor: pointer;
            background: linear-gradient(145deg, #f5deb3, #deb887);
            color: #8b4513;
            font-weight: 600;
        }
        
        button:hover { 
            background: linear-gradient(145deg, #deb887, #d2b48c);
        }
        
        button.secondary { 
            background: linear-gradient(145deg, #999, #777);
            color: white;
            border-color: #666;
        }

        /* 纯SVG棋盘 */
        .board-container {
            position: relative;
            background: #f5e6c8;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 100px rgba(139,69,19,0.1);
        }

        .status-bar {
            margin-top: 20px;
            padding: 15px 50px;
            background: rgba(245,222,179,0.95);
            border-radius: 15px;
            font-size: 22px;
            border: 3px solid #8b4513;
        }
        
        .status-bar .turn { 
            color: #8b4513; 
            font-weight: 700; 
        }
    </style>
</head>
<body>
    <!-- 首页 -->
    <div id="landingPage" class="landing-page">
        <div class="title-section">
            <div class="main-title">Nick的中国象棋</div>
            <div class="sub-title">楚河汉界 · 运筹帷幄</div>
        </div>
        
        <div class="welcome-text">—— 选择游戏模式 ——</div>
        
        <div class="mode-selection">
            <div class="mode-card" id="aiCard" onclick="selectMode('ai')">
                <div class="mode-icon">🤖</div>
                <h3>人机对战</h3>
                <p>与AI对弈<br>挑战不同难度</p>
                <div class="click-hint">👆 点击进入</div>
            </div>
            
            <div class="mode-card" id="pvpCard" onclick="selectMode('pvp')">
                <div class="mode-icon">👥</div>
                <h3>人人对战</h3>
                <p>创建或加入房间<br>与好友对弈</p>
                <div class="click-hint">👆 点击进入</div>
            </div>
        </div>
        
        <div id="selectionHint" class="selection-hint">请点击上方卡片选择游戏模式</div>
        
        <button id="enterBtn" class="enter-btn" onclick="enterGame()" disabled>请先选择模式</button>
    </div>
    
    <!-- 游戏容器 -->
    <div id="gameContainer" class="game-container">
        <div class="game-info">
            <div class="player-info" id="player1Info">
                <div class="player-color red"></div>
                <span id="player1Name">红方</span>
            </div>
            
            <select id="difficulty">
                <option value="1">入门</option>
                <option value="2" selected>业余</option>
                <option value="3">高手</option>
                <option value="4">大师</option>
            </select>
            
            <button onclick="startNewGame()">🔄 新游戏</button>
            <button class="secondary" onclick="undoMove()">↩️ 悔棋</button>
            <button class="secondary" onclick="exitGame()">🏠 退出</button>
            
            <div class="player-info" id="player2Info">
                <div class="player-color black"></div>
                <span id="player2Name">黑方</span>
            </div>
        </div>
        
        <div class="board-container">
            <svg id="xiangqi-board" width="1400" height="1600" viewBox="0 0 1400 1600" style="background: url('board-bg-clean.png') no-repeat center center; background-size: cover;">
                <defs>
                    <!-- 棋子渐变 -->
                    <radialGradient id="redPiece" cx="30%" cy="30%" r="70%">
                        <stop offset="0%" style="stop-color:#ff6666"/>
                        <stop offset="50%" style="stop-color:#cc0000"/>
                        <stop offset="100%" style="stop-color:#990000"/>
                    </radialGradient>
                    <radialGradient id="blackPiece" cx="30%" cy="30%" r="70%">
                        <stop offset="0%" style="stop-color:#666"/>
                        <stop offset="50%" style="stop-color:#333"/>
                        <stop offset="100%" style="stop-color:#000"/>
                    </radialGradient>
                </defs>
                
                <!-- 棋盘背景 -->
                <rect x="0" y="0" width="540" height="600" fill="#f5e6c8" rx="5"/>
                
                <!-- 棋盘边框 -->
                <rect x="30" y="30" width="480" height="540" fill="none" stroke="#8b4513" stroke-width="2"/>
                
                <!-- 横线 -->
                <g stroke="#8b4513" stroke-width="1">
                    <line x1="30" y1="30" x2="510" y2="30"/>
                    <line x1="30" y1="84" x2="510" y2="84"/>
                    <line x1="30" y1="138" x2="510" y2="138"/>
                    <line x1="30" y1="192" x2="510" y2="192"/>
                    <line x1="30" y1="246" x2="510" y2="246"/>
                    <!-- 楚河汉界 -->
                    <line x1="30" y1="300" x2="240" y2="300"/>
                    <line x1="300" y1="300" x2="510" y2="300"/>
                    <line x1="30" y1="354" x2="510" y2="354"/>
                    <line x1="30" y1="408" x2="510" y2="408"/>
                    <line x1="30" y1="462" x2="510" y2="462"/>
                    <line x1="30" y1="516" x2="510" y2="516"/>
                    <line x1="30" y1="570" x2="510" y2="570"/>
                </g>
                
                <!-- 竖线 -->
                <g stroke="#8b4513" stroke-width="1">
                    <!-- 上半部分 -->
                    <line x1="30" y1="30" x2="30" y2="300"/>
                    <line x1="84" y1="30" x2="84" y2="300"/>
                    <line x1="138" y1="30" x2="138" y2="300"/>
                    <line x1="192" y1="30" x2="192" y2="300"/>
                    <line x1="246" y1="30" x2="246" y2="300"/>
                    <line x1="300" y1="30" x2="300" y2="300"/>
                    <line x1="354" y1="30" x2="354" y2="300"/>
                    <line x1="408" y1="30" x2="408" y2="300"/>
                    <line x1="462" y1="30" x2="462" y2="300"/>
                    <line x1="510" y1="30" x2="510" y2="300"/>
                    <!-- 下半部分 -->
                    <line x1="30" y1="300" x2="30" y2="570"/>
                    <line x1="84" y1="300" x2="84" y2="570"/>
                    <line x1="138" y1="300" x2="138" y2="570"/>
                    <line x1="192" y1="300" x2="192" y2="570"/>
                    <line x1="246" y1="300" x2="246" y2="570"/>
                    <line x1="300" y1="300" x2="300" y2="570"/>
                    <line x1="354" y1="300" x2="354" y2="570"/>
                    <line x1="408" y1="300" x2="408" y2="570"/>
                    <line x1="462" y1="300" x2="462" y2="570"/>
                    <line x1="510" y1="300" x2="510" y2="570"/>
                </g>
                
                <!-- 九宫格斜线 -->
                <g stroke="#8b4513" stroke-width="1">
                    <!-- 上九宫 -->
                    <line x1="192" y1="30" x2="300" y2="138"/>
                    <line x1="300" y1="30" x2="192" y2="138"/>
                    <!-- 下九宫 -->
                    <line x1="192" y1="462" x2="300" y2="570"/>
                    <line x1="300" y1="462" x2="192" y2="570"/>
                </g>
                
                <!-- 楚河汉界文字 -->
                <text x="180" y="285" font-size="24" fill="#8b4513" font-family="KaiTi, serif" font-weight="bold">楚 河</text>
                <text x="360" y="285" font-size="24" fill="#8b4513" font-family="KaiTi, serif" font-weight="bold">汉 界</text>
                
                <!-- 棋子层 -->
                <g id="pieces-layer"></g>
            </svg>
        </div>
        
        <div class="status-bar">
            <div id="status" class="turn">红方回合</div>
        </div>
    </div>

    <script>
        // 音频管理
        const AudioManager = {
            playCapture() {
                const utterance = new SpeechSynthesisUtterance('吃');
                utterance.lang = 'zh-CN';
                utterance.pitch = 1.4;
                utterance.rate = 0.75;
                utterance.volume = 0.4;
                speechSynthesis.speak(utterance);
            },
            playMove() {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(250, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            },
            playSelect() {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(750, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.06);
            }
        };

        // 游戏状态
        const GameState = {
            gameMode: null,
            board: [],
            selectedPiece: null,
            currentTurn: 'red',
            moveHistory: [],
            gameOver: false,
            players: { red: '玩家', black: '电脑' }
        };

        // 首页功能
        function selectMode(mode) {
            GameState.gameMode = mode;
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('selected'));
            const selectedCard = mode === 'ai' ? document.getElementById('aiCard') : document.getElementById('pvpCard');
            selectedCard.classList.add('selected');
            
            const hint = document.getElementById('selectionHint');
            hint.textContent = mode === 'ai' ? '🤖 已选择人机对战，点击进入' : '👥 已选择人人对战，点击进入';
            hint.classList.add('show');
            
            const enterBtn = document.getElementById('enterBtn');
            enterBtn.disabled = false;
            enterBtn.textContent = '点击进入';
            
            AudioManager.playSelect();
        }
        
        function enterGame() {
            if (!GameState.gameMode) return;
            AudioManager.playSelect();
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            if (GameState.gameMode === 'ai') {
                GameState.players.red = '玩家';
                GameState.players.black = '电脑';
            }
            initGame();
        }
        
        function exitGame() {
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('landingPage').style.display = 'flex';
            GameState.gameMode = null;
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('selectionHint').classList.remove('show');
            document.getElementById('enterBtn').disabled = true;
            document.getElementById('enterBtn').textContent = '请先选择模式';
        }

        // 坐标定义 - 9x10网格，交叉点 (适配 1400x1600 背景图)
        const GRID_X = [70, 225, 380, 535, 690, 845, 1000, 1155, 1310, 1465]; // 9条线
        const GRID_X_POINTS = [70, 225, 380, 535, 690, 845, 1000, 1155, 1310]; // 9个交叉点
        const GRID_Y_POINTS = [70, 230, 390, 550, 710, 870, 1030, 1190, 1350, 1510]; // 10个交叉点
        
        const PIECES_NAME = {
            'R': '車', 'N': '馬', 'B': '相', 'A': '仕', 'K': '帥', 'C': '炮', 'P': '兵',
            'r': '車', 'n': '馬', 'b': '象', 'a': '士', 'k': '將', 'c': '砲', 'p': '卒'
        };

        function initGame() {
            document.getElementById('player1Name').textContent = GameState.players.red;
            document.getElementById('player2Name').textContent = GameState.players.black;
            
            // 初始化棋盘 - 标准中国象棋布局
            GameState.board = [
                ['r', 'n', 'b', 'a', 'k', 'a', 'b', 'n', 'r'],  // 0: 黑方底线
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],  // 1
                ['.', 'c', '.', '.', '.', '.', '.', 'c', '.'],  // 2: 黑方炮
                ['p', '.', 'p', '.', 'p', '.', 'p', '.', 'p'],  // 3: 黑方卒
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],  // 4
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],  // 5
                ['P', '.', 'P', '.', 'P', '.', 'P', '.', 'P'],  // 6: 红方兵
                ['.', 'C', '.', '.', '.', '.', '.', 'C', '.'],  // 7: 红方炮
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],  // 8
                ['R', 'N', 'B', 'A', 'K', 'A', 'B', 'N', 'R']   // 9: 红方底线
            ];
            
            GameState.selectedPiece = null;
            GameState.currentTurn = 'red';
            GameState.moveHistory = [];
            GameState.gameOver = false;
            
            renderBoard();
            updateStatus();
        }

        function renderBoard() {
            const layer = document.getElementById('pieces-layer');
            layer.innerHTML = '';
            
            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 9; col++) {
                    const piece = GameState.board[row][col];
                    if (piece !== '.') {
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        const isRed = piece === piece.toUpperCase();
                        
                        const cx = GRID_X_POINTS[col];
                        const cy = GRID_Y_POINTS[row];
                        
                        g.setAttribute('transform', `translate(${cx}, ${cy})`);
                        g.style.cursor = 'pointer';
                        
                        // 选中效果
                        if (GameState.selectedPiece && 
                            GameState.selectedPiece.row === row && 
                            GameState.selectedPiece.col === col) {
                            g.style.filter = 'drop-shadow(0 0 10px #ffd700)';
                        }
                        
                        // 棋子圆形
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('r', '55');
                        circle.setAttribute('fill', isRed ? 'url(#redPiece)' : 'url(#blackPiece)');
                        circle.setAttribute('stroke', isRed ? '#990000' : '#000');
                        circle.setAttribute('stroke-width', '3');
                        g.appendChild(circle);
                        
                        // 内圈高光
                        const highlight = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                        highlight.setAttribute('cx', '-20');
                        highlight.setAttribute('cy', '-20');
                        highlight.setAttribute('rx', '25');
                        highlight.setAttribute('ry', '15');
                        highlight.setAttribute('fill', 'rgba(255,255,255,0.3)');
                        g.appendChild(highlight);
                        
                        // 文字
                        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        text.setAttribute('y', '18');
                        text.setAttribute('text-anchor', 'middle');
                        text.setAttribute('font-size', '48');
                        text.setAttribute('font-family', 'KaiTi, serif');
                        text.setAttribute('font-weight', 'bold');
                        text.setAttribute('fill', isRed ? '#ffcccc' : '#cccccc');
                        text.textContent = PIECES_NAME[piece];
                        g.appendChild(text);
                        
                        // 点击事件
                        g.addEventListener('click', (e) => {
                            e.stopPropagation();
                            onPieceClick(row, col);
                        });
                        
                        layer.appendChild(g);
                    }
                }
            }
        }

        function onPieceClick(row, col) {
            if (GameState.gameOver) return;
            
            const piece = GameState.board[row][col];
            const pieceColor = piece === piece.toUpperCase() ? 'red' : 'black';
            
            // 如果已选中，尝试移动
            if (GameState.selectedPiece) {
                const validMoves = getValidMoves(GameState.selectedPiece.row, GameState.selectedPiece.col);
                const canMove = validMoves.some(m => m.row === row && m.col === col);
                if (canMove) {
                    makeMove(GameState.selectedPiece.row, GameState.selectedPiece.col, row, col);
                    return;
                }
            }
            
            // 只能选择己方棋子
            if (piece === '.' || pieceColor !== GameState.currentTurn) return;
            
            GameState.selectedPiece = {row, col};
            AudioManager.playSelect();
            renderBoard();
        }

        function getValidMoves(row, col) {
            const piece = GameState.board[row][col];
            if (piece === '.') return [];
            
            const moves = [];
            const type = piece.toLowerCase();
            const isRed = piece === piece.toUpperCase();
            
            if (type === 'r') { // 车
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    let r = row + dr, c = col + dc;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = GameState.board[r][c];
                        if (target === '.') {
                            moves.push({row: r, col: c});
                        } else {
                            const targetColor = target === target.toUpperCase() ? 'red' : 'black';
                            if (targetColor !== (isRed ? 'red' : 'black')) moves.push({row: r, col: c});
                            break;
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (type === 'n') { // 马
                const jumps = [[-2,-1], [-2,1], [-1,-2], [-1,2], [1,-2], [1,2], [2,-1], [2,1]];
                for (const [dr, dc] of jumps) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const blockR = row + (dr > 0 ? 1 : -1) * (Math.abs(dr) === 2 ? 1 : 0);
                        const blockC = col + (dc > 0 ? 1 : -1) * (Math.abs(dc) === 2 ? 0 : 1);
                        const blocker = Math.abs(dr) === 2 ? 
                            (GameState.board[blockR]?.[col] || '.') : 
                            (GameState.board[row]?.[blockC] || '.');
                        if (blocker === '.') {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'c') { // 炮
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    let r = row + dr, c = col + dc;
                    let jumped = false;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = GameState.board[r][c];
                        if (!jumped) {
                            if (target === '.') moves.push({row: r, col: c});
                            else jumped = true;
                        } else {
                            if (target !== '.') {
                                const targetColor = target === target.toUpperCase() ? 'red' : 'black';
                                if (targetColor !== (isRed ? 'red' : 'black')) moves.push({row: r, col: c});
                                break;
                            }
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (type === 'p') { // 兵/卒
                const dir = isRed ? -1 : 1;
                const r = row + dir;
                if (r >= 0 && r < 10) {
                    const target = GameState.board[r][col];
                    if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                        moves.push({row: r, col: col});
                    }
                }
                const crossed = isRed ? row <= 4 : row >= 5;
                if (crossed) {
                    for (const dc of [-1, 1]) {
                        const c = col + dc;
                        if (c >= 0 && c < 9) {
                            const target = GameState.board[row][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: row, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'k') { // 将/帅
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const inPalace = isRed ? (r >= 7 && c >= 3 && c <= 5) : (r <= 2 && c >= 3 && c <= 5);
                        if (inPalace) {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'a') { // 士/仕
                const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const inPalace = isRed ? (r >= 7 && c >= 3 && c <= 5) : (r <= 2 && c >= 3 && c <= 5);
                        if (inPalace) {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'b') { // 象/相
                const dirs = [[-2,-2], [-2,2], [2,-2], [2,2]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        if (isRed && r < 5) continue;
                        if (!isRed && r > 4) continue;
                        if (GameState.board[row + dr/2]?.[col + dc/2] !== '.') continue;
                        const target = GameState.board[r][c];
                        if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                            moves.push({row: r, col: c});
                        }
                    }
                }
            }
            
            return moves;
        }

        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = GameState.board[fromRow][fromCol];
            const captured = GameState.board[toRow][toCol];
            
            if (captured !== '.') {
                AudioManager.playCapture();
            } else {
                AudioManager.playMove();
            }
            
            GameState.board[toRow][toCol] = piece;
            GameState.board[fromRow][fromCol] = '.';
            
            GameState.moveHistory.push({
                piece: piece,
                from: {row: fromRow, col: fromCol},
                to: {row: toRow, col: toCol},
                captured: captured
            });
            
            GameState.selectedPiece = null;
            
            if (captured.toLowerCase() === 'k') {
                GameState.gameOver = true;
                const winner = GameState.currentTurn === 'red' ? GameState.players.red : GameState.players.black;
                setTimeout(() => alert(`${winner} 获胜！`), 100);
            }
            
            GameState.currentTurn = GameState.currentTurn === 'red' ? 'black' : 'red';
            renderBoard();
            updateStatus();
            
            // AI回合
            if (GameState.gameMode === 'ai' && GameState.currentTurn === 'black' && !GameState.gameOver) {
                setTimeout(makeAIMove, 500);
            }
        }

        function makeAIMove() {
            const difficulty = parseInt(document.getElementById('difficulty').value);
            const moves = [];
            
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = GameState.board[r][c];
                    if (piece !== '.' && piece === piece.toLowerCase()) {
                        const validMoves = getValidMoves(r, c);
                        for (const m of validMoves) {
                            moves.push({
                                from: {row: r, col: c},
                                to: m,
                                piece: piece,
                                captured: GameState.board[m.row][m.col]
                            });
                        }
                    }
                }
            }
            
            if (moves.length === 0) return;
            
            // 评估移动
            const scored = moves.map(m => {
                let score = 0;
                if (m.captured !== '.') {
                    const values = {p: 10, c: 45, n: 40, r: 90, b: 20, a: 20, k: 10000};
                    score += values[m.captured.toLowerCase()] || 0;
                }
                score += (m.to.row - m.from.row) * 2;
                score += (4 - Math.abs(m.to.col - 4)) * 2;
                return {move: m, score};
            }).sort((a, b) => b.score - a.score);
            
            let selected;
            if (difficulty === 1) {
                const top = scored.slice(0, Math.min(5, scored.length));
                selected = top[Math.floor(Math.random() * top.length)].move;
            } else if (difficulty === 2) {
                selected = Math.random() < 0.8 ? scored[0].move : scored[Math.floor(Math.random() * Math.min(3, scored.length))].move;
            } else {
                selected = scored[0].move;
            }
            
            makeMove(selected.from.row, selected.from.col, selected.to.row, selected.to.col);
        }

        function updateStatus() {
            const statusEl = document.getElementById('status');
            const p1Info = document.getElementById('player1Info');
            const p2Info = document.getElementById('player2Info');
            
            if (GameState.gameOver) {
                statusEl.textContent = '游戏结束';
                p1Info.classList.remove('active');
                p2Info.classList.remove('active');
                return;
            }
            
            const currentPlayer = GameState.currentTurn === 'red' ? GameState.players.red : GameState.players.black;
            statusEl.textContent = GameState.gameMode === 'ai' && GameState.currentTurn === 'black' ? '电脑思考中...' : `${currentPlayer} 的回合`;
            
            if (GameState.currentTurn === 'red') {
                p1Info.classList.add('active');
                p2Info.classList.remove('active');
            } else {
                p1Info.classList.remove('active');
                p2Info.classList.add('active');
            }
        }

        function startNewGame() {
            AudioManager.playSelect();
            initGame();
        }
        
        function undoMove() {
            if (GameState.moveHistory.length < 2 || GameState.gameOver) return;
            
            for (let i = 0; i < 2 && GameState.moveHistory.length > 0; i++) {
                const move = GameState.moveHistory.pop();
                GameState.board[move.from.row][move.from.col] = move.piece;
                GameState.board[move.to.row][move.to.col] = move.captured || '.';
            }
            
            GameState.currentTurn = 'red';
            GameState.selectedPiece = null;
            GameState.gameOver = false;
            
            renderBoard();
            updateStatus();
            AudioManager.playSelect();
        }

        // 初始化
        document.getElementById('enterBtn').textContent = '请先选择模式';
    </script>
</body>
