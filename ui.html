<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick的中国象棋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: STKaiti, KaiTi, "Microsoft YaHei", sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 30%, #F5F5DC 60%, #DEB887 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            overflow-x: hidden;
        }
        
        /* ========== 首页 ========== */
        .landing-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #2d5a4a 0%, #4a7c6f 30%, #87CEEB 60%, #E0F6FF 100%);
            position: relative;
        }
        
        .landing-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400"><path fill="%232d5a4a" d="M0,200 Q300,100 600,150 T1200,200 L1200,0 L0,0 Z"/></svg>') no-repeat bottom;
            background-size: cover;
            opacity: 0.3;
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 50px;
            padding: 30px 60px;
            background: linear-gradient(135deg, rgba(139,69,19,0.95), rgba(160,82,45,0.95));
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 4px solid #DAA520;
            position: relative;
            z-index: 1;
        }
        
        .main-title {
            font-size: 56px;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            letter-spacing: 12px;
            margin-bottom: 10px;
        }
        
        .sub-title {
            font-size: 20px;
            color: #F5DEB3;
            letter-spacing: 8px;
        }
        
        .welcome-text {
            font-size: 24px;
            color: #2d5a4a;
            margin-bottom: 40px;
            font-weight: 600;
            z-index: 1;
        }
        
        .mode-selection {
            display: flex;
            gap: 60px;
            margin-bottom: 40px;
            z-index: 1;
        }
        
        .mode-card {
            width: 280px;
            height: 380px;
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .mode-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .mode-card.selected {
            border-color: #FFD700;
            box-shadow: 0 0 30px rgba(255,215,0,0.6), 0 15px 40px rgba(0,0,0,0.3);
            transform: translateY(-15px) scale(1.05);
        }
        
        .mode-card.selected::after {
            content: '✓ 已选中';
            position: absolute;
            top: 15px;
            right: 15px;
            background: #FFD700;
            color: #8B4513;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .mode-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #8B4513, #A0522D);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            font-size: 60px;
            border: 4px solid #DAA520;
        }
        
        .mode-card h3 {
            font-size: 28px;
            color: #8B4513;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .mode-card p {
            font-size: 16px;
            color: #654321;
            text-align: center;
            line-height: 1.6;
        }
        
        .selection-hint {
            font-size: 22px;
            color: #8B4513;
            font-weight: 600;
            margin: 20px 0;
            padding: 15px 40px;
            background: rgba(255,215,0,0.3);
            border-radius: 30px;
            border: 2px dashed #DAA520;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1;
        }
        
        .selection-hint.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .enter-btn {
            padding: 18px 80px;
            font-size: 26px;
            background: linear-gradient(145deg, #FFD700, #DAA520);
            color: #8B4513;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 8px;
            box-shadow: 0 8px 25px rgba(218,165,32,0.5);
            transition: all 0.3s ease;
            z-index: 1;
        }
        
        .enter-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(218,165,32,0.6);
        }
        
        .enter-btn:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
        }
        
        /* ========== 房间面板 ========== */
        .room-panel {
            display: none;
            width: 100%;
            max-width: 600px;
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border: 4px solid #8B4513;
            margin: 50px auto;
        }
        
        .room-panel h3 {
            font-size: 32px;
            color: #8B4513;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .room-panel input {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #8B4513;
            border-radius: 10px;
            margin-bottom: 15px;
            font-family: inherit;
        }
        
        .room-panel button {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(145deg, #8B4513, #A0522D);
            color: #FFD700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            font-weight: 600;
        }
        
        .room-list {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            padding: 10px;
        }
        
        .room-item {
            background: rgba(139,69,19,0.1);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .room-item:hover {
            background: rgba(139,69,19,0.2);
            transform: translateX(5px);
        }
        
        /* ========== 游戏界面 ========== */
        .game-container {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            border: 3px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .player-info.active {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .player-color {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid #333;
        }
        
        .player-color.red { background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000); }
        .player-color.black { background: radial-gradient(circle at 30% 30%, #444, #000); }
        
        .player-info span { font-size: 20px; font-weight: 600; color: #333; }
        
        select, button {
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #8B4513;
            font-family: inherit;
            cursor: pointer;
            background: #F5DEB3;
            color: #8B4513;
        }
        
        button:hover { background: #DEB887; }
        button.secondary { background: #ccc; }
        
        /* ========== 棋盘 - 使用背景图 ========== */
        .board-wrapper {
            position: relative;
            width: 900px;
            height: 900px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .board-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 0;
        }
        
        #xiangqi-board {
            position: relative;
            width: 700px;
            height: 800px;
            z-index: 10;
        }
        
        /* ========== 3D棋子 ========== */
        .piece-group {
            cursor: pointer;
            transition: transform 0.1s ease-out;
        }
        
        .piece-group:hover { transform: scale(1.12); }
        
        .piece-3d {
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.5));
        }
        
        .piece-3d-red {
            fill: url(#red3DGradient);
            stroke: #8b0000;
            stroke-width: 2;
        }
        
        .piece-3d-black {
            fill: url(#black3DGradient);
            stroke: #1a1a1a;
            stroke-width: 2;
        }
        
        .piece-text-3d {
            font-family: STKaiti, KaiTi, serif;
            font-size: 26px;
            font-weight: 700;
            user-select: none;
            pointer-events: none;
        }
        
        .piece-text-3d-red { fill: #8b0000; }
        .piece-text-3d-black { fill: #1a1a1a; }
        
        .piece-selected .piece-3d {
            filter: drop-shadow(0 0 15px #FFD700) drop-shadow(3px 3px 6px rgba(0,0,0,0.5));
            animation: pulseSelected 0.8s infinite;
        }
        
        @keyframes pulseSelected {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }
        
        .move-line {
            stroke: #FF6347;
            stroke-width: 4;
            stroke-linecap: round;
            opacity: 0.8;
        }
        
        .status-bar {
            margin-top: 20px;
            padding: 15px 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            font-size: 22px;
            border: 3px solid #8B4513;
            z-index: 10;
        }
        
        .status-bar .turn { color: #8B4513; font-weight: 700; }
        
        .move-history {
            margin-top: 20px;
            max-width: 900px;
            width: 100%;
            z-index: 10;
        }
        
        .move-history h3 {
            margin-bottom: 10px;
            font-size: 20px;
            color: #333;
            text-align: center;
        }
        
        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 16px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #8B4513;
        }
        
        .move-tag {
            background: rgba(139,69,19,0.15);
            padding: 5px 12px;
            border-radius: 6px;
        }
        
        .move-tag.red { color: #c92a2a; }
        .move-tag.black { color: #333; }
    </style>
</head>
<body>
    <!-- 首页 -->
    <div id="landingPage" class="landing-page">
        <div class="title-section">
            <div class="main-title">中国象棋</div>
            <div class="sub-title">楚河汉界 · 运筹帷幄</div>
        </div>
        
        <div class="welcome-text">—— 选择游戏模式 ——</div>
        
        <div class="mode-selection">
            <div class="mode-card" id="aiCard" onclick="selectMode('ai')">
                <div class="mode-icon">🤖</div>
                <h3>人机对战</h3>
                <p>与AI对弈<br>挑战不同难度</p>
            </div>
            
            <div class="mode-card" id="pvpCard" onclick="selectMode('pvp')">
                <div class="mode-icon">👥</div>
                <h3>人人对战</h3>
                <p>创建或加入房间<br>与好友对弈</p>
            </div>
        </div>
        
        <div id="selectionHint" class="selection-hint">👆 请点击上方卡片选择游戏模式</div>
        
        <button id="enterBtn" class="enter-btn" onclick="enterGame()" disabled>请先选择模式</button>
    </div>
    
    <!-- 房间面板 -->
    <div id="roomPanel" class="room-panel">
        <h3>🏠 游戏房间</h3>
        <input type="text" id="username" placeholder="请输入您的名字">
        <input type="text" id="roomName" placeholder="房间名称（创建或搜索）">
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="createRoom()">➕ 创建房间</button>
            <button onclick="searchRooms()">🔍 搜索房间</button>
            <button class="secondary" onclick="backToHome()">⬅️ 返回</button>
        </div>
        <div class="room-list" id="roomList"></div>
    </div>
    
    <!-- 游戏容器 -->
    <div id="gameContainer" class="game-container">
        <div class="game-info">
            <div class="player-info" id="player1Info">
                <div class="player-color red"></div>
                <span id="player1Name">红方</span>
            </div>
            
            <select id="difficulty">
                <option value="1">入门</option>
                <option value="2" selected>业余</option>
                <option value="3">高手</option>
                <option value="4">大师</option>
            </select>
            
            <button onclick="startNewGame()">🔄 新游戏</button>
            <button class="secondary" onclick="undoMove()">↩️ 悔棋</button>
            <button class="secondary" onclick="exitGame()">🏠 退出</button>
            
            <div class="player-info" id="player2Info">
                <div class="player-color black"></div>
                <span id="player2Name">黑方</span>
            </div>
        </div>
        
        <div class="board-wrapper">
            <img src="board-bg.png" class="board-bg" alt="棋盘背景">
            
            <svg id="xiangqi-board" viewBox="0 0 700 800">
                <defs>
                    <radialGradient id="red3DGradient" cx="30%" cy="30%" r="70%">
                        <stop offset="0%" style="stop-color:#fff8f0"/>
                        <stop offset="30%" style="stop-color:#ffcccc"/>
                        <stop offset="60%" style="stop-color:#ff4444"/>
                        <stop offset="100%" style="stop-color:#cc0000"/>
                    </radialGradient>
                    
                    <radialGradient id="black3DGradient" cx="30%" cy="30%" r="70%">
                        <stop offset="0%" style="stop-color:#666"/>
                        <stop offset="30%" style="stop-color:#444"/>
                        <stop offset="60%" style="stop-color:#222"/>
                        <stop offset="100%" style="stop-color:#000"/>
                    </radialGradient>
                </defs>
                
                <g id="move-lines"></g>
                <g id="pieces-layer"></g>
            </svg>
        </div>
        
        <div class="status-bar">
            <div id="status" class="turn">红方回合</div>
        </div>
        
        <div class="move-history">
            <h3>📜 走法记录</h3>
            <div id="moves-list" class="moves-list"></div>
        </div>
    </div>

    <script>
        // ========== 音频管理器 ==========
        const AudioManager = {
            isMuted: false,
            
            // 播放"吃"音效 - 女声
            playCapture() {
                if (this.isMuted) return;
                const utterance = new SpeechSynthesisUtterance('吃');
                utterance.lang = 'zh-CN';
                utterance.pitch = 1.3;
                utterance.rate = 0.8;
                utterance.volume = 0.5;
                speechSynthesis.speak(utterance);
            },
            
            // 播放落子音效
            playMove() {
                if (this.isMuted) return;
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            },
            
            // 播放选择音效
            playSelect() {
                if (this.isMuted) return;
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        };

        // ========== 游戏状态 ==========
        const GameState = {
            currentUser: null,
            gameMode: null,
            board: [],
            selectedPiece: null,
            currentTurn: 'red',
            moveHistory: [],
            lastMove: null,
            isThinking: false,
            gameOver: false,
            players: { red: null, black: null }
        };

        // ========== 首页功能 ==========
        function selectMode(mode) {
            GameState.gameMode = mode;
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('selected'));
            const selectedCard = mode === 'ai' ? document.getElementById('aiCard') : document.getElementById('pvpCard');
            selectedCard.classList.add('selected');
            
            const hint = document.getElementById('selectionHint');
            hint.textContent = mode === 'ai' ? '🤖 已选择人机对战，点击开始进入' : '👥 已选择人人对战，点击开始进入';
            hint.classList.add('show');
            
            const enterBtn = document.getElementById('enterBtn');
            enterBtn.disabled = false;
            enterBtn.textContent = '点击进入';
        }
        
        function enterGame() {
            if (!GameState.gameMode) {
                alert('请先选择游戏模式');
                return;
            }
            if (GameState.gameMode === 'ai') {
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('gameContainer').style.display = 'flex';
                GameState.players.red = '玩家';
                GameState.players.black = '电脑';
                initGame();
            } else {
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('roomPanel').style.display = 'block';
            }
        }
        
        function backToHome() {
            document.getElementById('roomPanel').style.display = 'none';
            document.getElementById('landingPage').style.display = 'flex';
        }
        
        // ========== 房间系统 ==========
        const rooms = [];
        
        function createRoom() {
            const username = document.getElementById('username').value.trim();
            const roomName = document.getElementById('roomName').value.trim();
            if (!username || !roomName) {
                alert('请输入名字和房间名称');
                return;
            }
            GameState.currentUser = username;
            GameState.players.red = username;
            GameState.players.black = '等待加入...';
            rooms.push({ name: roomName, creator: username });
            document.getElementById('roomPanel').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            initGame();
        }
        
        function searchRooms() {
            const roomList = document.getElementById('roomList');
            if (rooms.length === 0) {
                roomList.innerHTML = '<div style="text-align:center; padding:20px;">暂无房间，请创建新房间</div>';
            } else {
                roomList.innerHTML = rooms.map((r, i) => `
                    <div class="room-item" onclick="joinRoom(${i})">
                        ${r.name} - 房主: ${r.creator}
                    </div>
                `).join('');
            }
        }
        
        function joinRoom(index) {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                alert('请输入您的名字');
                return;
            }
            GameState.currentUser = username;
            GameState.players.red = rooms[index].creator;
            GameState.players.black = username;
            document.getElementById('roomPanel').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            initGame();
        }
        
        // ========== 游戏功能 ==========
        function initGame() {
            document.getElementById('player1Name').textContent = GameState.players.red;
            document.getElementById('player2Name').textContent = GameState.players.black;
            
            GameState.board = [
                ['r','n','b','a','k','a','b','n','r'],
                ['.','.','.','.','.','.','.','.','.'],
                ['.','c','.','.','.','.','.','c','.'],
                ['p','.','p','.','p','.','p','.','p'],
                ['.','.','.','.','.','.','.','.','.'],
                ['.','.','.','.','.','.','.','.','.'],
                ['P','.','P','.','P','.','P','.','P'],
                ['.','C','.','.','.','.','.','C','.'],
                ['.','.','.','.','.','.','.','.','.'],
                ['R','N','B','A','K','A','B','N','R']
            ];
            
            GameState.selectedPiece = null;
            GameState.currentTurn = 'red';
            GameState.moveHistory = [];
            GameState.lastMove = null;
            GameState.isThinking = false;
            GameState.gameOver = false;
            
            renderBoard();
            updateStatus();
            updateMoveHistory();
        }
        
        const GRID_X = [35, 118, 201, 284, 350, 416, 499, 582, 665];
        const GRID_Y = [35, 118, 201, 284, 350, 450, 533, 616, 699, 765];
        const PIECES_NAME = {
            K: '帅', A: '仕', B: '相', N: '傌', R: '俥', C: '炮', P: '兵',
            k: '将', a: '士', b: '象', n: '马', r: '車', c: '砲', p: '卒'
        };
        
        function renderBoard() {
            const piecesLayer = document.getElementById('pieces-layer');
            piecesLayer.innerHTML = '';
            
            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 9; col++) {
                    const piece = GameState.board[row][col];
                    if (piece !== '.') {
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        const isRed = piece === piece.toUpperCase();
                        g.setAttribute('class', 'piece-group');
                        g.setAttribute('transform', `translate(${GRID_X[col]}, ${GRID_Y[row]})`);
                        
                        if (GameState.selectedPiece && 
                            GameState.selectedPiece.row === row && 
                            GameState.selectedPiece.col === col) {
                            g.classList.add('piece-selected');
                        }
                        
                        // 3D棋子圆形
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('r', '30');
                        circle.setAttribute('class', isRed ? 'piece-3d-red' : 'piece-3d-black');
                        g.appendChild(circle);
                        
                        // 高光
                        const shine = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                        shine.setAttribute('cx', '-10');
                        shine.setAttribute('cy', '-10');
                        shine.setAttribute('rx', '15');
                        shine.setAttribute('ry', '10');
                        shine.setAttribute('fill', 'rgba(255,255,255,0.3)');
                        g.appendChild(shine);
                        
                        // 文字
                        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        text.setAttribute('y', '8');
                        text.setAttribute('text-anchor', 'middle');
                        text.setAttribute('class', `piece-text-3d piece-text-3d-${isRed ? 'red' : 'black'}`);
                        text.textContent = PIECES_NAME[piece];
                        g.appendChild(text);
                        
                        g.addEventListener('click', (e) => {
                            e.stopPropagation();
                            onPieceClick(row, col);
                        });
                        
                        piecesLayer.appendChild(g);
                    }
                }
            }
        }
        
        function onPieceClick(row, col) {
            if (GameState.isThinking || GameState.gameOver) return;
            
            // 检查是否是当前玩家的回合（人人对战）
            if (GameState.gameMode === 'pvp') {
                const currentPlayer = GameState.currentTurn === 'red' ? GameState.players.red : GameState.players.black;
                if (currentPlayer !== GameState.currentUser && GameState.players.black !== '电脑') {
                    return;
                }
            }
            
            const piece = GameState.board[row][col];
            const pieceColor = piece === piece.toUpperCase() ? 'red' : (piece === '.' ? null : 'black');
            
            // 如果已选中，尝试吃子或移动
            if (GameState.selectedPiece) {
                const validMoves = getValidMoves(GameState.selectedPiece.row, GameState.selectedPiece.col);
                const canMove = validMoves.some(m => m.row === row && m.col === col);
                if (canMove) {
                    makeMove(GameState.selectedPiece.row, GameState.selectedPiece.col, row, col);
                    return;
                }
            }
            
            // 只能选择己方棋子
            if (piece === '.' || pieceColor !== GameState.currentTurn) return;
            
            GameState.selectedPiece = {row, col};
            AudioManager.playSelect();
            renderBoard();
        }
        
        function getValidMoves(row, col) {
            const piece = GameState.board[row][col];
            if (piece === '.') return [];
            
            const moves = [];
            const type = piece.toLowerCase();
            const isRed = piece === piece.toUpperCase();
            
            if (type === 'r') { // 车
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    let r = row + dr, c = col + dc;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = GameState.board[r][c];
                        if (target === '.') {
                            moves.push({row: r, col: c});
                        } else {
                            const targetColor = target === target.toUpperCase() ? 'red' : 'black';
                            if (targetColor !== (isRed ? 'red' : 'black')) moves.push({row: r, col: c});
                            break;
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (type === 'n') { // 马
                const jumps = [[-2,-1], [-2,1], [-1,-2], [-1,2], [1,-2], [1,2], [2,-1], [2,1]];
                for (const [dr, dc] of jumps) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const blockR = row + (dr > 0 ? 1 : -1) * (Math.abs(dr) === 2 ? 1 : 0);
                        const blockC = col + (dc > 0 ? 1 : -1) * (Math.abs(dc) === 2 ? 0 : 1);
                        const blocker = Math.abs(dr) === 2 ? GameState.board[blockR]?.[col] : GameState.board[row]?.[blockC];
                        if (blocker === '.') {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'c') { // 炮
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    let r = row + dr, c = col + dc;
                    let jumped = false;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = GameState.board[r][c];
                        if (!jumped) {
                            if (target === '.') moves.push({row: r, col: c});
                            else jumped = true;
                        } else {
                            if (target !== '.') {
                                const targetColor = target === target.toUpperCase() ? 'red' : 'black';
                                if (targetColor !== (isRed ? 'red' : 'black')) moves.push({row: r, col: c});
                                break;
                            }
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (type === 'p') { // 兵/卒
                const dir = isRed ? -1 : 1;
                const r = row + dir;
                if (r >= 0 && r < 10) {
                    const target = GameState.board[r][col];
                    if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                        moves.push({row: r, col: col});
                    }
                }
                const crossed = isRed ? row <= 4 : row >= 5;
                if (crossed) {
                    for (const dc of [-1, 1]) {
                        const c = col + dc;
                        if (c >= 0 && c < 9) {
                            const target = GameState.board[row][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: row, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'k') { // 将/帅
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const inPalace = isRed ? (r >= 7 && c >= 3 && c <= 5) : (r <= 2 && c >= 3 && c <= 5);
                        if (inPalace) {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'a') { // 士/仕
                const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const inPalace = isRed ? (r >= 7 && c >= 3 && c <= 5) : (r <= 2 && c >= 3 && c <= 5);
                        if (inPalace) {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'b') { // 象/相
                const dirs = [[-2,-2], [-2,2], [2,-2], [2,2]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        if (isRed && r < 5) continue;
                        if (!isRed && r > 4) continue;
                        if (GameState.board[row + dr/2][col + dc/2] !== '.') continue;
                        const target = GameState.board[r][c];
                        if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                            moves.push({row: r, col: c});
                        }
                    }
                }
            }
            
            return moves;
        }
        
        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = GameState.board[fromRow][fromCol];
            const captured = GameState.board[toRow][toCol];
            
            // 播放音效
            if (captured !== '.') {
                AudioManager.playCapture();
            } else {
                AudioManager.playMove();
            }
            
            // 执行移动
            GameState.board[toRow][toCol] = piece;
            GameState.board[fromRow][fromCol] = '.';
            
            GameState.lastMove = {from: {row: fromRow, col: fromCol}, to: {row: toRow, col: toCol}};
            
            GameState.moveHistory.push({
                piece: piece,
                from: {row: fromRow, col: fromCol},
                to: {row: toRow, col: toCol},
                captured: captured
            });
            
            GameState.selectedPiece = null;
            
            updateMoveHistory();
            
            // 检查游戏结束
            if (captured.toLowerCase() === 'k') {
                renderBoard();
                GameState.gameOver = true;
                const winner = GameState.currentTurn === 'red' ? GameState.players.red : GameState.players.black;
                setTimeout(() => alert(`${winner}获胜！`), 100);
                return;
            }
            
            // 切换回合
            GameState.currentTurn = GameState.currentTurn === 'red' ? 'black' : 'red';
            renderBoard();
            updateStatus();
            
            // AI回合
            if (GameState.gameMode === 'ai' && GameState.currentTurn === 'black' && !GameState.gameOver) {
                GameState.isThinking = true;
                updateStatus();
                setTimeout(makeAIMove, 500);
            }
        }
        
        function makeAIMove() {
            const difficulty = parseInt(document.getElementById('difficulty').value);
            const moves = [];
            
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = GameState.board[r][c];
                    if (piece !== '.' && piece === piece.toLowerCase()) {
                        const validMoves = getValidMoves(r, c);
                        for (const m of validMoves) {
                            moves.push({
                                from: {row: r, col: c},
                                to: m,
                                piece: piece,
                                captured: GameState.board[m.row][m.col]
                            });
                        }
                    }
                }
            }
            
            if (moves.length === 0) {
                GameState.isThinking = false;
                return;
            }
            
            // 评估移动
            const scored = moves.map(m => {
                let score = 0;
                if (m.captured !== '.') {
                    const values = {p: 10, c: 45, n: 40, r: 90, b: 20, a: 20, k: 10000};
                    score += values[m.captured.toLowerCase()] || 0;
                }
                score += (m.to.row - m.from.row) * 2;
                score += (4 - Math.abs(m.to.col - 4)) * 2;
                return {move: m, score};
            }).sort((a, b) => b.score - a.score);
            
            let selected;
            if (difficulty === 1) {
                const top = scored.slice(0, Math.min(5, scored.length));
                selected = top[Math.floor(Math.random() * top.length)].move;
            } else if (difficulty === 2) {
                selected = Math.random() < 0.8 ? scored[0].move : scored[Math.floor(Math.random() * Math.min(3, scored.length))].move;
            } else {
                selected = scored[0].move;
            }
            
            makeMove(selected.from.row, selected.from.col, selected.to.row, selected.to.col);
            GameState.isThinking = false;
        }
        
        function updateStatus() {
            const statusEl = document.getElementById('status');
            const p1Info = document.getElementById('player1Info');
            const p2Info = document.getElementById('player2Info');
            
            if (GameState.gameOver) {
                statusEl.textContent = '游戏结束';
                p1Info.classList.remove('active');
                p2Info.classList.remove('active');
                return;
            }
            
            const currentPlayer = GameState.currentTurn === 'red' ? GameState.players.red : GameState.players.black;
            statusEl.textContent = `${currentPlayer}的回合`;
            
            if (GameState.currentTurn === 'red') {
                p1Info.classList.add('active');
                p2Info.classList.remove('active');
            } else {
                p1Info.classList.remove('active');
                p2Info.classList.add('active');
            }
        }
        
        function updateMoveHistory() {
            const listEl = document.getElementById('moves-list');
            listEl.innerHTML = '';
            
            GameState.moveHistory.forEach((move, index) => {
                const tag = document.createElement('span');
                tag.className = `move-tag ${move.piece === move.piece.toUpperCase() ? 'red' : 'black'}`;
                const colNames = 'abcdefghi';
                const num = Math.floor(index / 2) + 1;
                const side = index % 2 === 0 ? '' : '...';
                tag.textContent = `${num}${side} ${PIECES_NAME[move.piece]}${colNames[move.from.col]}${move.from.row}-${colNames[move.to.col]}${move.to.row}`;
                listEl.appendChild(tag);
            });
        }
        
        function startNewGame() { initGame(); }
        
        function undoMove() {
            if (GameState.moveHistory.length < 2 || GameState.isThinking) return;
            
            for (let i = 0; i < 2 && GameState.moveHistory.length > 0; i++) {
                const move = GameState.moveHistory.pop();
                GameState.board[move.from.row][move.from.col] = move.piece;
                GameState.board[move.to.row][move.to.col] = move.captured || '.';
            }
            
            GameState.currentTurn = 'red';
            GameState.selectedPiece = null;
            GameState.gameOver = false;
            GameState.lastMove = GameState.moveHistory.length > 0 ? {
                from: GameState.moveHistory[GameState.moveHistory.length - 1].from,
                to: GameState.moveHistory[GameState.moveHistory.length - 1].to
            } : null;
            
            renderBoard();
            updateStatus();
            updateMoveHistory();
        }
        
        function exitGame() {
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('landingPage').style.display = 'flex';
            GameState.players = { red: null, black: null };
            GameState.gameMode = null;
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('selectionHint').classList.remove('show');
            document.getElementById('enterBtn').disabled = true;
            document.getElementById('enterBtn').textContent = '请先选择模式';
        }
        
        document.getElementById('xiangqi-board').addEventListener('click', (e) => {
            if (e.target.tagName === 'svg') {
                GameState.selectedPiece = null;
                renderBoard();
            }
        });
        
        // 初始化
        document.getElementById('enterBtn').textContent = '请先选择模式';
    </script>
</body>
