<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick的中国象棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 28px;
        }
        
        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        select, button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        select {
            background: #2d3a4f;
            color: #fff;
        }
        
        button {
            background: #e94560;
            color: white;
            font-weight: 600;
        }
        
        button:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }
        
        button.secondary {
            background: #4a5568;
        }
        
        button.secondary:hover {
            background: #5a6578;
        }
        
        #board-container {
            position: relative;
            background: #f5deb3;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        #xiangqi-board {
            width: 540px;
            height: 600px;
        }
        
        /* 棋子样式 - 使用SVG样式 */
        .piece-group {
            cursor: pointer;
        }
        
        .piece-circle {
            transition: all 0.2s;
        }
        
        .piece-group:hover .piece-circle {
            filter: brightness(1.1);
        }
        
        .piece-text {
            font-family: STKaiti, KaiTi, serif;
            font-size: 24px;
            font-weight: bold;
            user-select: none;
            pointer-events: none;
        }
        
        .piece-red .piece-circle {
            fill: url(#redGradient);
            stroke: #c92a2a;
            stroke-width: 2;
        }
        
        .piece-red .piece-text {
            fill: #c92a2a;
        }
        
        .piece-black .piece-circle {
            fill: url(#blackGradient);
            stroke: #212529;
            stroke-width: 2;
        }
        
        .piece-black .piece-text {
            fill: #212529;
        }
        
        .piece-selected .piece-circle {
            filter: drop-shadow(0 0 8px #ffd700);
            stroke: #ffd700;
            stroke-width: 4;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .piece-last-move .piece-circle {
            stroke: #4ade80;
            stroke-width: 3;
        }
        
        .valid-move-dot {
            fill: rgba(72, 187, 120, 0.7);
            cursor: pointer;
        }
        
        .valid-move-dot:hover {
            fill: rgba(72, 187, 120, 0.9);
        }
        
        .move-line {
            stroke: #e94560;
            stroke-width: 3;
            stroke-dasharray: 5,5;
            opacity: 0.8;
        }
        
        .move-marker {
            fill: none;
            stroke: #e94560;
            stroke-width: 2;
        }
        
        .status-bar {
            margin-top: 15px;
            padding: 12px 24px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            text-align: center;
            max-width: 600px;
        }
        
        .status-bar .turn {
            font-size: 16px;
            font-weight: 600;
            color: #4ade80;
        }
        
        .status-bar .turn.ai-turn {
            color: #f87171;
        }
        
        .move-history {
            margin-top: 15px;
            max-width: 600px;
            width: 100%;
        }
        
        .move-history h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #94a3b8;
        }
        
        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 13px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .move-tag {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .move-tag.red {
            color: #ff6b6b;
        }
        
        .move-tag.black {
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <h1>🐼 Nick的中国象棋</h1>
    
    <div class="game-info">
        <div class="difficulty-selector">
            <label>难度:</label>
            <select id="difficulty">
                <option value="1">入门 😊</option>
                <option value="2" selected>业余 🤔</option>
                <option value="3">高手 😤</option>
                <option value="4">大师 👑</option>
            </select>
        </div>
        <button onclick="startNewGame()">新游戏</button>
        <button class="secondary" onclick="undoMove()">悔棋</button>
    </div>
    
    <div id="board-container">
        <svg id="xiangqi-board" viewBox="0 0 540 600">
            <!-- 定义渐变和滤镜 -->
            <defs>
                <!-- 红方棋子渐变 -->
                <radialGradient id="redGradient" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" style="stop-color:#fff5f5"/>
                    <stop offset="50%" style="stop-color:#ff6b6b"/>
                    <stop offset="100%" style="stop-color:#c92a2a"/>
                </radialGradient>
                
                <!-- 黑方棋子渐变 -->
                <radialGradient id="blackGradient" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" style="stop-color:#f8f9fa"/>
                    <stop offset="50%" style="stop-color:#6c757d"/>
                    <stop offset="100%" style="stop-color:#212529"/>
                </radialGradient>
            </defs>
            
            <!-- 背景 -->
            <rect x="0" y="0" width="540" height="600" fill="#f5deb3"/>
            
            <!-- 网格线 -->
            <g stroke="#8b4513" stroke-width="1.5">
                <!-- 竖线（上半部分）-->
                <line x1="30" y1="30" x2="30" y2="270"/>
                <line x1="90" y1="30" x2="90" y2="270"/>
                <line x1="150" y1="30" x2="150" y2="270"/>
                <line x1="210" y1="30" x2="210" y2="270"/>
                <line x1="270" y1="30" x2="270" y2="270"/>
                <line x1="330" y1="30" x2="330" y2="270"/>
                <line x1="390" y1="30" x2="390" y2="270"/>
                <line x1="450" y1="30" x2="450" y2="270"/>
                <line x1="510" y1="30" x2="510" y2="270"/>
                
                <!-- 竖线（下半部分）-->
                <line x1="30" y1="330" x2="30" y2="570"/>
                <line x1="90" y1="330" x2="90" y2="570"/>
                <line x1="150" y1="330" x2="150" y2="570"/>
                <line x1="210" y1="330" x2="210" y2="570"/>
                <line x1="270" y1="330" x2="270" y2="570"/>
                <line x1="330" y1="330" x2="330" y2="570"/>
                <line x1="390" y1="330" x2="390" y2="570"/>
                <line x1="450" y1="330" x2="450" y2="570"/>
                <line x1="510" y1="330" x2="510" y2="570"/>
                
                <!-- 横线（上半部分）-->
                <line x1="30" y1="30" x2="510" y2="30"/>
                <line x1="30" y1="90" x2="510" y2="90"/>
                <line x1="30" y1="150" x2="510" y2="150"/>
                <line x1="30" y1="210" x2="510" y2="210"/>
                <line x1="30" y1="270" x2="510" y2="270"/>
                
                <!-- 横线（下半部分）-->
                <line x1="30" y1="330" x2="510" y2="330"/>
                <line x1="30" y1="390" x2="510" y2="390"/>
                <line x1="30" y1="450" x2="510" y2="450"/>
                <line x1="30" y1="510" x2="510" y2="510"/>
                <line x1="30" y1="570" x2="510" y2="570"/>
                
                <!-- 九宫格斜线（黑方）-->
                <line x1="210" y1="30" x2="330" y2="150"/>
                <line x1="330" y1="30" x2="210" y2="150"/>
                
                <!-- 九宫格斜线（红方）-->
                <line x1="210" y1="450" x2="330" y2="570"/>
                <line x1="330" y1="450" x2="210" y2="570"/>
            </g>
            
            <!-- 楚河汉界背景 -->
            <rect x="30" y="270" width="480" height="60" fill="#e8d4a8"/>
            
            <!-- 楚河汉界文字 -->
            <text x="150" y="310" font-family="STKaiti, KaiTi, serif" font-size="32" fill="#8b4513" text-anchor="middle" font-weight="bold">楚 河</text>
            <text x="390" y="310" font-family="STKaiti, KaiTi, serif" font-size="32" fill="#8b4513" text-anchor="middle" font-weight="bold">汉 界</text>
            
            <!-- 炮位标记 -->
            <g fill="none" stroke="#8b4513" stroke-width="1.5">
                <!-- 黑方炮位 -->
                <path d="M 75 105 L 85 105 M 80 100 L 80 110 M 135 105 L 145 105 M 140 100 L 140 110"/>
                <path d="M 375 105 L 385 105 M 380 100 L 380 110 M 435 105 L 445 105 M 440 100 L 440 110"/>
                <!-- 红方炮位 -->
                <path d="M 75 495 L 85 495 M 80 490 L 80 500 M 135 495 L 145 495 M 140 490 L 140 500"/>
                <path d="M 375 495 L 385 495 M 380 490 L 380 500 M 435 495 L 445 495 M 440 490 L 440 500"/>
            </g>
            
            <!-- 各图层 -->
            <g id="move-lines"></g>
            <g id="pieces-layer"></g>
            <g id="valid-moves"></g>
        </svg>
    </div>
    
    <div class="status-bar">
        <div id="status" class="turn">点击棋子开始游戏</div>
    </div>
    
    <div class="move-history">
        <h3>走法记录</h3>
        <div id="moves-list" class="moves-list"></div>
    </div>

    <script>
        // 棋子定义
        const PIECES = {
            K: { name: '帅', type: 'king', color: 'red' },
            A: { name: '仕', type: 'advisor', color: 'red' },
            B: { name: '相', type: 'elephant', color: 'red' },
            N: { name: '傌', type: 'horse', color: 'red' },
            R: { name: '俥', type: 'rook', color: 'red' },
            C: { name: '炮', type: 'cannon', color: 'red' },
            P: { name: '兵', type: 'pawn', color: 'red' },
            k: { name: '将', type: 'king', color: 'black' },
            a: { name: '士', type: 'advisor', color: 'black' },
            b: { name: '象', type: 'elephant', color: 'black' },
            n: { name: '马', type: 'horse', color: 'black' },
            r: { name: '車', type: 'rook', color: 'black' },
            c: { name: '砲', type: 'cannon', color: 'black' },
            p: { name: '卒', type: 'pawn', color: 'black' },
        };
        
        // 初始棋盘
        const INITIAL_BOARD = [
            ['r', 'n', 'b', 'a', 'k', 'a', 'b', 'n', 'r'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', 'c', '.', '.', '.', '.', '.', 'c', '.'],
            ['p', '.', 'p', '.', 'p', '.', 'p', '.', 'p'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['P', '.', 'P', '.', 'P', '.', 'P', '.', 'P'],
            ['.', 'C', '.', '.', '.', '.', '.', 'C', '.'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['R', 'N', 'B', 'A', 'K', 'A', 'B', 'N', 'R'],
        ];
        
        // 网格坐标（交叉点）
        const GRID_X = [30, 90, 150, 210, 270, 330, 390, 450, 510];
        const GRID_Y = [30, 90, 150, 210, 270, 330, 390, 450, 510, 570];
        
        let board = [];
        let selectedPiece = null;
        let currentTurn = 'red';
        let moveHistory = [];
        let validMoves = [];
        let lastMove = null;
        let isThinking = false;
        
        // 初始化棋盘
        function initBoard() {
            board = INITIAL_BOARD.map(row => [...row]);
            selectedPiece = null;
            currentTurn = 'red';
            moveHistory = [];
            validMoves = [];
            lastMove = null;
            isThinking = false;
            clearMoveLines();
            renderBoard();
            updateStatus('你是红方，请点击棋子');
            updateMoveHistory();
        }
        
        // 渲染棋子 - 使用SVG原生元素
        function renderBoard() {
            const piecesLayer = document.getElementById('pieces-layer');
            piecesLayer.innerHTML = '';
            
            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 9; col++) {
                    const piece = board[row][col];
                    if (piece !== '.') {
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        g.setAttribute('class', `piece-group piece-${PIECES[piece].color}`);
                        g.setAttribute('transform', `translate(${GRID_X[col]}, ${GRID_Y[row]})`);
                        g.style.cursor = 'pointer';
                        
                        // 选中高亮
                        if (selectedPiece && selectedPiece.row === row && selectedPiece.col === col) {
                            g.classList.add('piece-selected');
                        }
                        
                        // 最后移动的棋子标记
                        if (lastMove && lastMove.to.row === row && lastMove.to.col === col) {
                            g.classList.add('piece-last-move');
                        }
                        
                        // 棋子圆形背景
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('r', '22');
                        circle.setAttribute('class', 'piece-circle');
                        g.appendChild(circle);
                        
                        // 棋子文字
                        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        text.setAttribute('y', '8');
                        text.setAttribute('text-anchor', 'middle');
                        text.setAttribute('class', 'piece-text');
                        text.textContent = PIECES[piece].name;
                        g.appendChild(text);
                        
                        // 点击事件
                        g.addEventListener('click', (e) => {
                            e.stopPropagation();
                            onPieceClick(row, col);
                        });
                        
                        piecesLayer.appendChild(g);
                    }
                }
            }
            
            // 渲染可移动位置
            renderValidMoves();
        }
        
        // 渲染可移动位置
        function renderValidMoves() {
            const validMovesLayer = document.getElementById('valid-moves');
            validMovesLayer.innerHTML = '';
            
            for (const move of validMoves) {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', GRID_X[move.col]);
                circle.setAttribute('cy', GRID_Y[move.row]);
                circle.setAttribute('r', '10');
                circle.setAttribute('class', 'valid-move-dot');
                circle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    makeMove(selectedPiece.row, selectedPiece.col, move.row, move.col);
                });
                validMovesLayer.appendChild(circle);
            }
        }
        
        // 绘制移动路线
        function drawMoveLine(fromRow, fromCol, toRow, toCol) {
            const linesLayer = document.getElementById('move-lines');
            linesLayer.innerHTML = '';
            
            // 移动线
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', GRID_X[fromCol]);
            line.setAttribute('y1', GRID_Y[fromRow]);
            line.setAttribute('x2', GRID_X[toCol]);
            line.setAttribute('y2', GRID_Y[toRow]);
            line.setAttribute('class', 'move-line');
            linesLayer.appendChild(line);
            
            // 起点标记
            const startCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            startCircle.setAttribute('cx', GRID_X[fromCol]);
            startCircle.setAttribute('cy', GRID_Y[fromRow]);
            startCircle.setAttribute('r', '6');
            startCircle.setAttribute('fill', '#e94560');
            startCircle.setAttribute('opacity', '0.5');
            linesLayer.appendChild(startCircle);
            
            // 终点标记
            const endCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            endCircle.setAttribute('cx', GRID_X[toCol]);
            endCircle.setAttribute('cy', GRID_Y[toRow]);
            endCircle.setAttribute('r', '8');
            endCircle.setAttribute('class', 'move-marker');
            linesLayer.appendChild(endCircle);
        }
        
        function clearMoveLines() {
            document.getElementById('move-lines').innerHTML = '';
        }
        
        function getPieceColor(piece) {
            if (piece === '.') return null;
            return piece === piece.toUpperCase() ? 'red' : 'black';
        }
        
        // 获取合法移动
        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (piece === '.') return [];
            
            const moves = [];
            const pieceType = PIECES[piece].type;
            const isRed = getPieceColor(piece) === 'red';
            
            if (pieceType === 'rook') {
                const directions = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of directions) {
                    let r = row + dr, c = col + dc;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = board[r][c];
                        if (target === '.') {
                            moves.push({row: r, col: c});
                        } else {
                            if (getPieceColor(target) !== getPieceColor(piece)) {
                                moves.push({row: r, col: c});
                            }
                            break;
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (pieceType === 'horse') {
                const jumps = [[-2,-1], [-2,1], [-1,-2], [-1,2], [1,-2], [1,2], [2,-1], [2,1]];
                for (const [dr, dc] of jumps) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        if (Math.abs(dr) === 2) {
                            if (board[row + (dr > 0 ? 1 : -1)][col] === '.') {
                                const target = board[r][c];
                                if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                    moves.push({row: r, col: c});
                                }
                            }
                        } else {
                            if (board[row][col + (dc > 0 ? 1 : -1)] === '.') {
                                const target = board[r][c];
                                if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                    moves.push({row: r, col: c});
                                }
                            }
                        }
                    }
                }
            } else if (pieceType === 'cannon') {
                const directions = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of directions) {
                    let r = row + dr, c = col + dc;
                    let jumped = false;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = board[r][c];
                        if (!jumped) {
                            if (target === '.') {
                                moves.push({row: r, col: c});
                            } else {
                                jumped = true;
                            }
                        } else {
                            if (target !== '.') {
                                if (getPieceColor(target) !== getPieceColor(piece)) {
                                    moves.push({row: r, col: c});
                                }
                                break;
                            }
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (pieceType === 'pawn') {
                const direction = isRed ? -1 : 1;
                const r = row + direction;
                if (r >= 0 && r < 10) {
                    const target = board[r][col];
                    if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                        moves.push({row: r, col: col});
                    }
                }
                const crossed = isRed ? row <= 4 : row >= 5;
                if (crossed) {
                    for (const dc of [-1, 1]) {
                        const c = col + dc;
                        if (c >= 0 && c < 9) {
                            const target = board[row][c];
                            if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                moves.push({row: row, col: c});
                            }
                        }
                    }
                }
            } else if (pieceType === 'king') {
                const offsets = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of offsets) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const palaceRow = isRed ? r >= 7 : r <= 2;
                        const palaceCol = c >= 3 && c <= 5;
                        if (palaceRow && palaceCol) {
                            const target = board[r][c];
                            if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (pieceType === 'advisor') {
                const offsets = [[-1,-1], [-1,1], [1,-1], [1,1]];
                for (const [dr, dc] of offsets) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const palaceRow = isRed ? r >= 7 : r <= 2;
                        const palaceCol = c >= 3 && c <= 5;
                        if (palaceRow && palaceCol) {
                            const target = board[r][c];
                            if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (pieceType === 'elephant') {
                const offsets = [[-2,-2], [-2,2], [2,-2], [2,2]];
                for (const [dr, dc] of offsets) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        if (isRed && r < 5) continue;
                        if (!isRed && r > 4) continue;
                        if (board[row + dr/2][col + dc/2] !== '.') continue;
                        const target = board[r][c];
                        if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                            moves.push({row: r, col: c});
                        }
                    }
                }
            }
            
            return moves;
        }
        
        // 点击棋子
        function onPieceClick(row, col) {
            if (isThinking || currentTurn !== 'red') return;
            
            const piece = board[row][col];
            const pieceColor = getPieceColor(piece);
            
            // 如果已选中棋子，且点击的是敌方棋子，检查是否可以吃
            if (selectedPiece && pieceColor === 'black') {
                const isValidCapture = validMoves.some(m => m.row === row && m.col === col);
                if (isValidCapture) {
                    makeMove(selectedPiece.row, selectedPiece.col, row, col);
                    return;
                }
            }
            
            // 只能选择自己的棋子
            if (piece === '.' || pieceColor !== 'red') return;
            
            selectedPiece = {row, col};
            validMoves = getValidMoves(row, col);
            renderBoard();
            updateStatus(`已选中 ${PIECES[piece].name}，请选择目标位置`);
        }
        
        // 执行移动
        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const captured = board[toRow][toCol];
            
            drawMoveLine(fromRow, fromCol, toRow, toCol);
            
            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = '.';
            
            lastMove = {from: {row: fromRow, col: fromCol}, to: {row: toRow, col: toCol}};
            
            moveHistory.push({
                piece: piece,
                from: {row: fromRow, col: fromCol},
                to: {row: toRow, col: toCol},
                captured: captured
            });
            
            selectedPiece = null;
            validMoves = [];
            
            updateMoveHistory();
            
            if (captured.toLowerCase() === 'k') {
                renderBoard();
                setTimeout(() => {
                    alert('🎉 你赢了！');
                    clearMoveLines();
                }, 100);
                return;
            }
            
            currentTurn = 'black';
            renderBoard();
            
            isThinking = true;
            updateStatus('AI思考中...', true);
            setTimeout(makeAIMove, 500);
        }
        
        // AI走棋
        function makeAIMove() {
            const difficulty = parseInt(document.getElementById('difficulty').value);
            const allMoves = [];
            
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = board[r][c];
                    if (piece !== '.' && getPieceColor(piece) === 'black') {
                        const moves = getValidMoves(r, c);
                        for (const m of moves) {
                            allMoves.push({
                                from: {row: r, col: c},
                                to: m,
                                piece: piece,
                                captured: board[m.row][m.col]
                            });
                        }
                    }
                }
            }
            
            if (allMoves.length === 0) {
                updateStatus('AI无法移动，你赢了！');
                isThinking = false;
                clearMoveLines();
                return;
            }
            
            const scoredMoves = allMoves.map(move => {
                let score = 0;
                if (move.captured !== '.') {
                    const values = {p: 10, c: 45, n: 40, r: 90, b: 20, a: 20, k: 1000};
                    score += values[move.captured.toLowerCase()] || 0;
                }
                const direction = move.piece === move.piece.toLowerCase() ? 1 : -1;
                score += (move.to.row - move.from.row) * direction * 2;
                const centerDist = Math.abs(move.to.col - 4);
                score += (4 - centerDist) * 2;
                return {move, score};
            });
            
            scoredMoves.sort((a, b) => b.score - a.score);
            
            let selectedMove;
            if (difficulty === 1) {
                const topMoves = scoredMoves.slice(0, Math.min(5, scoredMoves.length));
                selectedMove = topMoves[Math.floor(Math.random() * topMoves.length)].move;
            } else if (difficulty === 2) {
                if (Math.random() < 0.8) {
                    selectedMove = scoredMoves[0].move;
                } else {
                    selectedMove = scoredMoves[Math.floor(Math.random() * Math.min(3, scoredMoves.length))].move;
                }
            } else {
                selectedMove = scoredMoves[0].move;
            }
            
            drawMoveLine(selectedMove.from.row, selectedMove.from.col, 
                        selectedMove.to.row, selectedMove.to.col);
            
            board[selectedMove.to.row][selectedMove.to.col] = selectedMove.piece;
            board[selectedMove.from.row][selectedMove.from.col] = '.';
            
            lastMove = {from: selectedMove.from, to: selectedMove.to};
            
            moveHistory.push({
                piece: selectedMove.piece,
                from: selectedMove.from,
                to: selectedMove.to,
                captured: selectedMove.captured
            });
            
            if (selectedMove.captured.toLowerCase() === 'k') {
                renderBoard();
                setTimeout(() => {
                    alert('AI获胜！');
                    clearMoveLines();
                }, 100);
                isThinking = false;
                return;
            }
            
            currentTurn = 'red';
            isThinking = false;
            renderBoard();
            updateStatus('你的回合，请点击棋子');
            updateMoveHistory();
        }
        
        function updateStatus(text, isAI = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = isAI ? 'turn ai-turn' : 'turn';
        }
        
        function updateMoveHistory() {
            const listEl = document.getElementById('moves-list');
            listEl.innerHTML = '';
            
            moveHistory.forEach((move, index) => {
                const tag = document.createElement('span');
                tag.className = `move-tag ${PIECES[move.piece].color}`;
                const colNames = 'abcdefghi';
                const moveNum = Math.floor(index / 2) + 1;
                const side = index % 2 === 0 ? '' : '...';
                tag.textContent = `${moveNum}${side} ${PIECES[move.piece].name}${colNames[move.from.col]}${move.from.row}-${colNames[move.to.col]}${move.to.row}`;
                listEl.appendChild(tag);
            });
            
            listEl.scrollLeft = listEl.scrollWidth;
        }
        
        function startNewGame() {
            initBoard();
        }
        
        function undoMove() {
            if (moveHistory.length < 2 || isThinking) return;
            
            for (let i = 0; i < 2 && moveHistory.length > 0; i++) {
                const move = moveHistory.pop();
                board[move.from.row][move.from.col] = move.piece;
                board[move.to.row][move.to.col] = move.captured || '.';
            }
            
            currentTurn = 'red';
            selectedPiece = null;
            validMoves = [];
            lastMove = moveHistory.length > 0 ? {
                from: moveHistory[moveHistory.length - 1].from,
                to: moveHistory[moveHistory.length - 1].to
            } : null;
            
            clearMoveLines();
            renderBoard();
            updateStatus('你的回合，请点击棋子');
            updateMoveHistory();
        }
        
        // 点击空白处取消选择
        document.getElementById('xiangqi-board').addEventListener('click', (e) => {
            if (e.target.tagName === 'svg' || e.target.tagName === 'rect') {
                selectedPiece = null;
                validMoves = [];
                renderBoard();
            }
        });
        
        // 初始化
        initBoard();
    </script>
</body>
</html>
