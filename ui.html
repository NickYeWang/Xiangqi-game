<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick的中国象棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Noto Serif SC', STKaiti, KaiTi, serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 30%, #F5F5DC 60%, #DEB887 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            overflow-x: hidden;
        }
        
        /* 背景装饰 - 远山淡影 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 80%, rgba(100,149,237,0.3) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 70%, rgba(100,149,237,0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 首页容器 */
        .landing-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* 标题区域 */
        .title-section {
            text-align: center;
            margin-bottom: 50px;
            padding: 30px 60px;
            background: linear-gradient(135deg, rgba(139,69,19,0.9), rgba(160,82,45,0.9));
            border-radius: 20px;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.3),
                inset 0 2px 10px rgba(255,255,255,0.2);
            border: 3px solid #DAA520;
            position: relative;
        }
        
        .title-section::before,
        .title-section::after {
            content: '❖';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: #FFD700;
        }
        
        .title-section::before { left: 20px; }
        .title-section::after { right: 20px; }
        
        .main-title {
            font-size: 56px;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 
                3px 3px 6px rgba(0,0,0,0.5),
                0 0 20px rgba(255,215,0,0.3);
            letter-spacing: 12px;
            margin-bottom: 10px;
        }
        
        .sub-title {
            font-size: 20px;
            color: #F5DEB3;
            letter-spacing: 8px;
            opacity: 0.9;
        }
        
        /* 欢迎语 */
        .welcome-text {
            font-size: 24px;
            color: #8B4513;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        /* 模式选择卡片容器 */
        .mode-selection {
            display: flex;
            gap: 60px;
            margin-bottom: 40px;
            perspective: 1000px;
        }
        
        /* 模式卡片 */
        .mode-card {
            width: 280px;
            height: 380px;
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.2),
                inset 0 2px 5px rgba(255,255,255,0.5);
            border: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .mode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 10px,
                    rgba(139,69,19,0.03) 10px,
                    rgba(139,69,19,0.03) 20px
                );
            pointer-events: none;
        }
        
        .mode-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.3),
                inset 0 2px 5px rgba(255,255,255,0.5);
        }
        
        .mode-card.selected {
            border-color: #FFD700;
            box-shadow: 
                0 0 30px rgba(255,215,0,0.6),
                0 15px 40px rgba(0,0,0,0.3),
                inset 0 2px 10px rgba(255,255,255,0.3);
            transform: translateY(-15px) scale(1.05);
        }
        
        .mode-card.selected::after {
            content: '✓ 已选中';
            position: absolute;
            top: 15px;
            right: 15px;
            background: #FFD700;
            color: #8B4513;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* 模式图标 */
        .mode-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #8B4513, #A0522D);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 
                0 8px 20px rgba(0,0,0,0.3),
                inset 0 3px 8px rgba(255,255,255,0.2);
            border: 4px solid #DAA520;
            font-size: 60px;
        }
        
        .mode-card h3 {
            font-size: 28px;
            color: #8B4513;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 4px;
        }
        
        .mode-card p {
            font-size: 16px;
            color: #654321;
            text-align: center;
            line-height: 1.6;
        }
        
        /* 选中提示 */
        .selection-hint {
            font-size: 22px;
            color: #8B4513;
            font-weight: 600;
            margin: 20px 0;
            padding: 15px 40px;
            background: rgba(255,215,0,0.3);
            border-radius: 30px;
            border: 2px dashed #DAA520;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        
        .selection-hint.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 进入按钮 */
        .enter-btn {
            padding: 18px 80px;
            font-size: 26px;
            background: linear-gradient(145deg, #FFD700, #DAA520);
            color: #8B4513;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 8px;
            box-shadow: 
                0 8px 25px rgba(218,165,32,0.5),
                inset 0 2px 5px rgba(255,255,255,0.5);
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .enter-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 12px 35px rgba(218,165,32,0.6),
                inset 0 2px 5px rgba(255,255,255,0.5);
        }
        
        .enter-btn:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 水波纹装饰 */
        .water-decoration {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to top, rgba(64,164,223,0.4), rgba(64,164,223,0.1), transparent);
            pointer-events: none;
            z-index: 0;
        }
        
        .water-decoration::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 100px,
                rgba(255,255,255,0.1) 100px,
                rgba(255,255,255,0.1) 200px
            );
            animation: waterFlow 15s linear infinite;
        }
        
        @keyframes waterFlow {
            0% { transform: translateX(0); }
            100% { transform: translateX(33.33%); }
        }
        
        /* 房间面板 */
        .room-panel {
            display: none;
            width: 100%;
            max-width: 600px;
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border: 4px solid #8B4513;
        }
        
        .room-panel h3 {
            font-size: 32px;
            color: #8B4513;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }
        
        .room-panel input {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #8B4513;
            border-radius: 10px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.9);
            font-family: inherit;
        }
        
        .room-panel button {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(145deg, #8B4513, #A0522D);
            color: #FFD700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .room-panel button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .room-list {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            padding: 10px;
        }
        
        .room-item {
            background: rgba(139,69,19,0.1);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .room-item:hover {
            background: rgba(139,69,19,0.2);
            border-color: #DAA520;
            transform: translateX(5px);
        }
        
        /* 游戏界面 - 中国风水边棋盘 */
        .game-container {
            display: none;
            width: 100%;
            max-width: 1000px;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 25px;
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
            border-radius: 15px;
            border: 3px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .player-info.active {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5), 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .player-color {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid #8B4513;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
        }
        
        .player-color.red {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a);
        }
        
        .player-color.black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
        }
        
        .player-info span {
            font-size: 20px;
            font-weight: 600;
            color: #8B4513;
        }
        
        select, button {
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #8B4513;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        select {
            background: #F5DEB3;
            color: #8B4513;
        }
        
        button {
            background: linear-gradient(145deg, #8B4513, #A0522D);
            color: #FFD700;
            font-weight: 600;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button.secondary {
            background: linear-gradient(145deg, #808080, #696969);
            color: white;
        }
        
        /* 棋盘容器 - 木质水边风格 */
        #board-container {
            position: relative;
            width: 850px;
            height: 950px;
            background: linear-gradient(145deg, #D2691E, #8B4513);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 3px 10px rgba(255,255,255,0.2);
            border: 8px solid #5D3A1A;
        }
        
        /* 棋盘表面木纹 */
        #board-container::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 120px;
            background: 
                repeating-linear-gradient(
                    0deg,
                    #DEB887,
                    #DEB887 2px,
                    #D2B48C 2px,
                    #D2B48C 4px
                );
            border-radius: 10px;
            opacity: 0.8;
        }
        
        /* 水波纹效果 */
        .water-border {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            height: 90px;
            background: linear-gradient(to top, rgba(64,164,223,0.6), rgba(64,164,223,0.3), transparent);
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }
        
        .water-border::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 80px,
                rgba(255,255,255,0.15) 80px,
                rgba(255,255,255,0.15) 160px
            );
            animation: waterFlow 8s linear infinite;
        }
        
        .water-ripple {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            height: 30px;
        }
        
        .ripple {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.4);
            animation: rippleEffect 2s ease-in-out infinite;
        }
        
        .ripple:nth-child(1) { bottom: 5px; animation-delay: 0s; }
        .ripple:nth-child(2) { bottom: 15px; animation-delay: 0.7s; }
        .ripple:nth-child(3) { bottom: 25px; animation-delay: 1.4s; }
        
        @keyframes rippleEffect {
            0%, 100% { transform: scaleX(1); opacity: 0.3; }
            50% { transform: scaleX(1.1); opacity: 0.6; }
        }
        
        /* 楚河汉界文字 */
        .river-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 200px;
            pointer-events: none;
            z-index: 5;
        }
        
        .river-text span {
            font-size: 48px;
            color: #8B4513;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            opacity: 0.7;
        }
        
        #xiangqi-board {
            position: absolute;
            top: 50px;
            left: 75px;
            width: 700px;
            height: 800px;
            z-index: 10;
        }
        
        /* 3D棋子 */
        .piece-group {
            cursor: pointer;
            transition: transform 0.15s ease-out;
        }
        
        .piece-group:hover {
            transform: scale(1.15);
        }
        
        .piece-3d {
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.4));
        }
        
        .piece-3d-red {
            fill: url(#red3DGradient);
            stroke: #8b0000;
            stroke-width: 2;
        }
        
        .piece-3d-black {
            fill: url(#black3DGradient);
            stroke: #1a1a1a;
            stroke-width: 2;
        }
        
        .piece-text-3d {
            font-family: 'Noto Serif SC', STKaiti, KaiTi, serif;
            font-size: 28px;
            font-weight: 700;
            user-select: none;
            pointer-events: none;
        }
        
        .piece-text-3d-red { fill: #8b0000; }
        .piece-text-3d-black { fill: #1a1a1a; }
        
        .piece-selected .piece-3d {
            filter: drop-shadow(0 0 20px #FFD700) drop-shadow(4px 4px 8px rgba(0,0,0,0.4));
            animation: pulseSelected 1s infinite;
        }
        
        @keyframes pulseSelected {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .piece-last-move .piece-3d {
            filter: drop-shadow(0 0 15px #4ade80) drop-shadow(4px 4px 8px rgba(0,0,0,0.4));
        }
        
        .move-line {
            stroke: #FF6347;
            stroke-width: 4;
            stroke-linecap: round;
            opacity: 0.9;
            filter: drop-shadow(0 0 5px rgba(255,99,71,0.8));
        }
        
        .status-bar {
            margin-top: 20px;
            padding: 15px 50px;
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
            border-radius: 15px;
            text-align: center;
            font-size: 22px;
            border: 3px solid #8B4513;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .status-bar .turn {
            color: #8B4513;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        
        .audio-control button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
            font-size: 24px;
            background: linear-gradient(145deg, #F5DEB3, #DEB887);
            border: 3px solid #8B4513;
        }
        
        .move-history {
            margin-top: 20px;
            max-width: 850px;
            width: 100%;
        }
        
        .move-history h3 {
            margin-bottom: 10px;
            font-size: 20px;
            color: #8B4513;
            text-align: center;
        }
        
        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 16px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(245,222,179,0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #8B4513;
        }
        
        .move-tag {
            background: rgba(139,69,19,0.15);
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid rgba(139,69,19,0.3);
        }
        
        .move-tag.red { color: #c92a2a; }
        .move-tag.black { color: #333; }
    </style>
</head>
<body>
    <!-- 音频控制 -->
    <div class="audio-control">
        <button id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>
    
    <!-- 水波纹装饰 -->
    <div class="water-decoration"></div>
    
    <!-- 首页 -->
    <div id="landingPage" class="landing-page">
        <div class="title-section">
            <div class="main-title">中国象棋</div>
            <div class="sub-title">楚河汉界 · 运筹帷幄</div>
        </div>
        
        <div class="welcome-text">—— 选择游戏模式 ——</div>
        
        <div class="mode-selection">
            <div class="mode-card" id="aiCard" onclick="selectMode('ai')">
                <div class="mode-icon">🤖</div>
                <h3>人机对战</h3>
                <p>与AI对弈<br>挑战不同难度</p>
            </div>
            
            <div class="mode-card" id="pvpCard" onclick="selectMode('pvp')">
                <div class="mode-icon">👥</div>
                <h3>人人对战</h3>
                <p>创建或加入房间<br>与好友对弈</p>
            </div>
        </div>
        
        <div id="selectionHint" class="selection-hint">👆 请点击上方卡片选择游戏模式</div>
        
        <button id="enterBtn" class="enter-btn" onclick="enterGame()" disabled>点击进入</button>
    </div>
    
    <!-- 房间面板 -->
    <div id="roomPanel" class="room-panel">
        <h3>🏠 游戏房间</h3>
        <input type="text" id="username" placeholder="请输入您的名字">
        <input type="text" id="roomName" placeholder="房间名称（创建或搜索）">
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="createRoom()">➕ 创建房间</button>
            <button onclick="searchRooms()">🔍 搜索房间</button>
            <button class="secondary" onclick="backToHome()">⬅️ 返回</button>
        </div>
        <div class="room-list" id="roomList"></div>
    </div>
    
    <!-- 游戏容器 -->
    <div id="gameContainer" class="game-container">
        <div class="game-info">
            <div class="player-info" id="player1Info">
                <div class="player-color red"></div>
                <span id="player1Name">红方</span>
            </div>
            
            <select id="difficulty">
                <option value="1">入门</option>
                <option value="2" selected>业余</option>
                <option value="3">高手</option>
                <option value="4">大师</option>
            </select>
            
            <button onclick="startNewGame()">🔄 新游戏</button>
            <button class="secondary" onclick="undoMove()">↩️ 悔棋</button>
            <button class="secondary" onclick="exitGame()">🏠 退出</button>
            
            <div class="player-info" id="player2Info">
                <div class="player-color black"></div>
                <span id="player2Name">黑方</span>
            </div>
        </div>
        
        <div id="board-container">
            <!-- 水波纹效果 -->
            <div class="water-border">
                <div class="water-ripple">
                    <div class="ripple"></div>
                    <div class="ripple"></div>
                    <div class="ripple"></div>
                </div>
            </div>
            
            <!-- 楚河汉界 -->
            <div class="river-text">
                <span>楚河</span>
                <span>汉界</span>
            </div>
            
            <svg id="xiangqi-board" viewBox="0 0 700 800">
                <defs>
                    <radialGradient id="red3DGradient" cx="30%" cy="30%" r="70%">
                        <stop offset="0%" style="stop-color:#fff8f0"/>
                        <stop offset="30%" style="stop-color:#ffcccc"/>
                        <stop offset="60%" style="stop-color:#ff6b6b"/>
                        <stop offset="100%" style="stop-color:#c92a2a"/>
                    </radialGradient>

        <div class="status-bar">
            <div id="status" class="turn">红方回合</div>
        </div>
        
        <div class="move-history">
            <h3>📜 走法记录</h3>
            <div id="moves-list" class="moves-list"></div>
        </div>
    </div>

    <script>
        // 游戏状态
        const GameState = {
            currentUser: null,
            gameMode: null,
            room: null,
            board: [],
            selectedPiece: null,
            currentTurn: 'red',
            moveHistory: [],
            lastMove: null,
            isThinking: false,
            gameOver: false,
            players: { red: null, black: null }
        };
        
        // 选择模式
        function selectMode(mode) {
            GameState.gameMode = mode;
            
            // 更新卡片样式
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            const selectedCard = mode === 'ai' ? document.getElementById('aiCard') : document.getElementById('pvpCard');
            selectedCard.classList.add('selected');
            
            // 显示提示
            const hint = document.getElementById('selectionHint');
            hint.textContent = mode === 'ai' ? '🤖 已选择人机对战，点击开始进入' : '👥 已选择人人对战，点击开始进入';
            hint.classList.add('show');
            
            // 启用进入按钮
            const enterBtn = document.getElementById('enterBtn');
            enterBtn.disabled = false;
            enterBtn.textContent = '点击进入';
        }
        
        // 进入游戏
        function enterGame() {
            if (!GameState.gameMode) {
                alert('请先选择游戏模式');
                return;
            }
            
            if (GameState.gameMode === 'ai') {
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('roomPanel').style.display = 'none';
                document.getElementById('gameContainer').style.display = 'flex';
                GameState.players.red = '玩家';
                GameState.players.black = '电脑';
                initGame();
            } else {
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('roomPanel').style.display = 'block';
            }
        }
        
        // 返回首页
        function backToHome() {
            document.getElementById('roomPanel').style.display = 'none';
            document.getElementById('landingPage').style.display = 'flex';
            GameState.gameMode = null;
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('selectionHint').classList.remove('show');
            document.getElementById('enterBtn').disabled = true;
            document.getElementById('enterBtn').textContent = '请先选择模式';
        }
        
        // 创建房间
        function createRoom() {
            const username = document.getElementById('username').value.trim();
            const roomName = document.getElementById('roomName').value.trim();
            
            if (!username || !roomName) {
                alert('请输入名字和房间名称');
                return;
            }
            
            GameState.currentUser = username;
            GameState.players.red = username;
            GameState.players.black = '等待中...';
            
            document.getElementById('roomPanel').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            initGame();
        }
        
        // 搜索房间（模拟）
        function searchRooms() {
            const roomList = document.getElementById('roomList');
            roomList.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">暂无可用房间</div>';
        }
        
        // 初始化游戏
        function initGame() {
            document.getElementById('player1Name').textContent = GameState.players.red;
            document.getElementById('player2Name').textContent = GameState.players.black;
            
            // 初始化棋盘
            GameState.board = [
                ['r','n','b','a','k','a','b','n','r'],
                ['.','.','.','.','.','.','.','.','.'],
                ['.','c','.','.','.','.','.','c','.'],
                ['p','.','p','.','p','.','p','.','p'],
                ['.','.','.','.','.','.','.','.','.'],
                ['.','.','.','.','.','.','.','.','.'],
                ['P','.','P','.','P','.','P','.','P'],
                ['.','C','.','.','.','.','.','C','.'],
                ['.','.','.','.','.','.','.','.','.'],
                ['R','N','B','A','K','A','B','N','R']
            ];
            
            GameState.selectedPiece = null;
            GameState.currentTurn = 'red';
            GameState.moveHistory = [];
            GameState.lastMove = null;
            GameState.isThinking = false;
            GameState.gameOver = false;
            
            clearMoveLines();
            renderBoard();
            updateStatus();
            updateMoveHistory();
        }
        
        // 渲染棋盘
        function renderBoard() {
            const piecesLayer = document.getElementById('pieces-layer');
            piecesLayer.innerHTML = '';
            
            const GRID_X = [35, 118, 201, 284, 350, 416, 499, 582, 665];
            const GRID_Y = [35, 118, 201, 284, 350, 450, 533, 616, 699, 765];
            
            const PIECES = {
                K: '帅', A: '仕', B: '相', N: '傌', R: '俥', C: '炮', P: '兵',
                k: '将', a: '士', b: '象', n: '马', r: '車', c: '砲', p: '卒'
            };
            
            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 9; col++) {
                    const piece = GameState.board[row][col];
                    if (piece !== '.') {
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        const isRed = piece === piece.toUpperCase();
                        g.setAttribute('class', `piece-group ${isRed ? 'piece-red' : 'piece-black'}`);
                        g.setAttribute('transform', `translate(${GRID_X[col]}, ${GRID_Y[row]})`);
                        
                        if (GameState.selectedPiece && 
                            GameState.selectedPiece.row === row && 
                            GameState.selectedPiece.col === col) {
                            g.classList.add('piece-selected');
                        }
                        
                        if (GameState.lastMove && 
                            GameState.lastMove.to.row === row && 
                            GameState.lastMove.to.col === col) {
                            g.classList.add('piece-last-move');
                        }
                        
                        // 棋子圆形
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('r', '32');
                        circle.setAttribute('class', isRed ? 'piece-3d-red' : 'piece-3d-black');
                        g.appendChild(circle);
                        
                        // 高光
                        const shine = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                        shine.setAttribute('cx', '-12');
                        shine.setAttribute('cy', '-12');
                        shine.setAttribute('rx', '18');
                        shine.setAttribute('ry', '12');
                        shine.setAttribute('fill', 'rgba(255,255,255,0.4)');
                        g.appendChild(shine);
                        
                        // 文字
                        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        text.setAttribute('y', '10');
                        text.setAttribute('text-anchor', 'middle');
                        text.setAttribute('class', `piece-text-3d piece-text-3d-${isRed ? 'red' : 'black'}`);
                        text.textContent = PIECES[piece];
                        g.appendChild(text);
                        
                        g.addEventListener('click', (e) => {
                            e.stopPropagation();
                            onPieceClick(row, col);
                        });
                        
                        piecesLayer.appendChild(g);
                    }
                }
            }
        }
        
        // 点击棋子
        function onPieceClick(row, col) {
            if (GameState.isThinking || GameState.gameOver) return;
            
            const piece = GameState.board[row][col];
            const pieceColor = piece === piece.toUpperCase() ? 'red' : (piece === '.' ? null : 'black');
            
            // 如果已选中，尝试吃子
            if (GameState.selectedPiece && pieceColor && pieceColor !== GameState.currentTurn) {
                const validMoves = getValidMoves(GameState.selectedPiece.row, GameState.selectedPiece.col);
                const canCapture = validMoves.some(m => m.row === row && m.col === col);
                if (canCapture) {
                    makeMove(GameState.selectedPiece.row, GameState.selectedPiece.col, row, col);
                    return;
                }
            }
            
            // 只能选择己方棋子
            if (piece === '.' || pieceColor !== GameState.currentTurn) return;
            
            GameState.selectedPiece = {row, col};
            renderBoard();
        }
        
        // 获取合法移动
        function getValidMoves(row, col) {
            const piece = GameState.board[row][col];
            if (piece === '.') return [];
            
            const moves = [];
            const type = piece.toLowerCase();
            const isRed = piece === piece.toUpperCase();
            
            if (type === 'r') { // 车
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    let r = row + dr, c = col + dc;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = GameState.board[r][c];
                        if (target === '.') {
                            moves.push({row: r, col: c});
                        } else {
                            const targetColor = target === target.toUpperCase() ? 'red' : 'black';
                            const pieceColor = isRed ? 'red' : 'black';
                            if (targetColor !== pieceColor) moves.push({row: r, col: c});
                            break;
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (type === 'n') { // 马
                const jumps = [[-2,-1], [-2,1], [-1,-2], [-1,2], [1,-2], [1,2], [2,-1], [2,1]];
                for (const [dr, dc] of jumps) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const blockR = row + (dr > 0 ? 1 : -1) * (Math.abs(dr) === 2 ? 1 : 0);
                        const blockC = col + (dc > 0 ? 1 : -1) * (Math.abs(dc) === 2 ? 0 : 1);
                        const blocker = Math.abs(dr) === 2 ? GameState.board[blockR]?.[col] : GameState.board[row]?.[blockC];
                        if (blocker === '.') {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'c') { // 炮
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    let r = row + dr, c = col + dc;
                    let jumped = false;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = GameState.board[r][c];
                        if (!jumped) {
                            if (target === '.') moves.push({row: r, col: c});
                            else jumped = true;
                        } else {
                            if (target !== '.') {
                                const targetColor = target === target.toUpperCase() ? 'red' : 'black';
                                if (targetColor !== (isRed ? 'red' : 'black')) moves.push({row: r, col: c});
                                break;
                            }
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (type === 'p') { // 兵
                const dir = isRed ? -1 : 1;
                const r = row + dir;
                if (r >= 0 && r < 10) {
                    const target = GameState.board[r][col];
                    if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                        moves.push({row: r, col: col});
                    }
                }
                const crossed = isRed ? row <= 4 : row >= 5;
                if (crossed) {
                    for (const dc of [-1, 1]) {
                        const c = col + dc;
                        if (c >= 0 && c < 9) {
                            const target = GameState.board[row][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: row, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'k') { // 将/帅
                const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const inPalace = isRed ? (r >= 7 && c >= 3 && c <= 5) : (r <= 2 && c >= 3 && c <= 5);
                        if (inPalace) {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'a') { // 士
                const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const inPalace = isRed ? (r >= 7 && c >= 3 && c <= 5) : (r <= 2 && c >= 3 && c <= 5);
                        if (inPalace) {
                            const target = GameState.board[r][c];
                            if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                                moves.push({row: r, col: c});
                            }
                        }
                    }
                }
            } else if (type === 'b') { // 象
                const dirs = [[-2,-2], [-2,2], [2,-2], [2,2]];
                for (const [dr, dc] of dirs) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        if (isRed && r < 5) continue;
                        if (!isRed && r > 4) continue;
                        if (GameState.board[row + dr/2][col + dc/2] !== '.') continue;
                        const target = GameState.board[r][c];
                        if (target === '.' || (target === target.toUpperCase() ? 'red' : 'black') !== (isRed ? 'red' : 'black')) {
                            moves.push({row: r, col: c});
                        }
                    }
                }
            }
            
            return moves;
        }
        
        // 执行移动
        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = GameState.board[fromRow][fromCol];
            const captured = GameState.board[toRow][toCol];
            
            // 绘制路线
            drawMoveLine(fromRow, fromCol, toRow, toCol);
            
            // 执行移动
            GameState.board[toRow][toCol] = piece;
            GameState.board[fromRow][fromCol] = '.';
            
            GameState.lastMove = {from: {row: fromRow, col: fromCol}, to: {row: toRow, col: toCol}};
            
            GameState.moveHistory.push({
                piece: piece,
                from: {row: fromRow, col: fromCol},
                to: {row: toRow, col: toCol},
                captured: captured
            });
            
            GameState.selectedPiece = null;
            
            updateMoveHistory();
            
            // 检查游戏结束
            if (captured.toLowerCase() === 'k') {
                renderBoard();
                GameState.gameOver = true;
                const winner = GameState.currentTurn === 'red' ? GameState.players.red : GameState.players.black;
                setTimeout(() => alert(`${winner}获胜！`), 100);
                return;
            }
            
            // 切换回合
            GameState.currentTurn = GameState.currentTurn === 'red' ? 'black' : 'red';
            renderBoard();
            updateStatus();
            
            // AI回合
            if (GameState.gameMode === 'ai' && GameState.currentTurn === 'black' && !GameState.gameOver) {
                GameState.isThinking = true;
                updateStatus();
                setTimeout(makeAIMove, 500);
            }
        }
        
        // 绘制移动路线
        function drawMoveLine(fromRow, fromCol, toRow, toCol) {
            const linesLayer = document.getElementById('move-lines');
            linesLayer.innerHTML = '';
            
            const GRID_X = [35, 118, 201, 284, 350, 416, 499, 582, 665];
            const GRID_Y = [35, 118, 201, 284, 350, 450, 533, 616, 699, 765];
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', GRID_X[fromCol]);
            line.setAttribute('y1', GRID_Y[fromRow]);
            line.setAttribute('x2', GRID_X[toCol]);
            line.setAttribute('y2', GRID_Y[toRow]);
            line.setAttribute('class', 'move-line');
            linesLayer.appendChild(line);
        }
        
        function clearMoveLines() {
            document.getElementById('move-lines').innerHTML = '';
        }
        
        // 更新状态
        function updateStatus() {
            const statusEl = document.getElementById('status');
            const p1Info = document.getElementById('player1Info');
            const p2Info = document.getElementById('player2Info');
            
            if (GameState.gameOver) {
                statusEl.textContent = '游戏结束';
                p1Info.classList.remove('active');
                p2Info.classList.remove('active');
                return;
            }
            
            const currentPlayer = GameState.currentTurn === 'red' ? GameState.players.red : GameState.players.black;
            statusEl.textContent = `${currentPlayer}的回合`;
            
            if (GameState.currentTurn === 'red') {
                p1Info.classList.add('active');
                p2Info.classList.remove('active');
            } else {
                p1Info.classList.remove('active');
                p2Info.classList.add('active');
            }
        }
        
        // AI走棋
        function makeAIMove() {
            const difficulty = parseInt(document.getElementById('difficulty').value);
            const moves = [];
            
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = GameState.board[r][c];
                    if (piece !== '.' && piece === piece.toLowerCase()) {
                        const validMoves = getValidMoves(r, c);
                        for (const m of validMoves) {
                            moves.push({
                                from: {row: r, col: c},
                                to: m,
                                piece: piece,
                                captured: GameState.board[m.row][m.col]
                            });
                        }
                    }
                }
            }
            
            if (moves.length === 0) {
                GameState.isThinking = false;
                return;
            }
            
            // 评估移动
            const scored = moves.map(m => {
                let score = 0;
                if (m.captured !== '.') {
                    const values = {p: 10, c: 45, n: 40, r: 90, b: 20, a: 20, k: 10000};
                    score += values[m.captured.toLowerCase()] || 0;
                }
                score += (m.to.row - m.from.row) * 2;
                score += (4 - Math.abs(m.to.col - 4)) * 2;
                return {move: m, score};
            }).sort((a, b) => b.score - a.score);
            
            let selected;
            if (difficulty === 1) {
                const top = scored.slice(0, Math.min(5, scored.length));
                selected = top[Math.floor(Math.random() * top.length)].move;
            } else if (difficulty === 2) {
                selected = Math.random() < 0.8 ? scored[0].move : scored[Math.floor(Math.random() * Math.min(3, scored.length))].move;
            } else {
                selected = scored[0].move;
            }
            
            makeMove(selected.from.row, selected.from.col, selected.to.row, selected.to.col);
            GameState.isThinking = false;
        }
        
        // 更新走法记录
        function updateMoveHistory() {
            const listEl = document.getElementById('moves-list');
            listEl.innerHTML = '';
            
            const PIECES = {
                K: '帅', A: '仕', B: '相', N: '傌', R: '俥', C: '炮', P: '兵',
                k: '将', a: '士', b: '象', n: '马', r: '車', c: '砲', p: '卒'
            };
            
            GameState.moveHistory.forEach((move, index) => {
                const tag = document.createElement('span');
                tag.className = `move-tag ${move.piece === move.piece.toUpperCase() ? 'red' : 'black'}`;
                const colNames = 'abcdefghi';
                const num = Math.floor(index / 2) + 1;
                const side = index % 2 === 0 ? '' : '...';
                tag.textContent = `${num}${side} ${PIECES[move.piece]}${colNames[move.from.col]}${move.from.row}-${colNames[move.to.col]}${move.to.row}`;
                listEl.appendChild(tag);
            });
        }
        
        // 新游戏
        function startNewGame() {
            initGame();
        }
        
        // 悔棋
        function undoMove() {
            if (GameState.moveHistory.length < 2 || GameState.isThinking) return;
            
            for (let i = 0; i < 2 && GameState.moveHistory.length > 0; i++) {
                const move = GameState.moveHistory.pop();
                GameState.board[move.from.row][move.from.col] = move.piece;
                GameState.board[move.to.row][move.to.col] = move.captured || '.';
            }
            
            GameState.currentTurn = 'red';
            GameState.selectedPiece = null;
            GameState.gameOver = false;
            GameState.lastMove = GameState.moveHistory.length > 0 ? {
                from: GameState.moveHistory[GameState.moveHistory.length - 1].from,
                to: GameState.moveHistory[GameState.moveHistory.length - 1].to
            } : null;
            
            clearMoveLines();
            renderBoard();
            updateStatus();
            updateMoveHistory();
        }
        
        // 退出游戏
        function exitGame() {
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('landingPage').style.display = 'flex';
            GameState.players = { red: null, black: null };
            GameState.gameMode = null;
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('selectionHint').classList.remove('show');
            document.getElementById('enterBtn').disabled = true;
            document.getElementById('enterBtn').textContent = '请先选择模式';
        }
        
        // 静音切换
        function toggleMute() {
            const btn = document.getElementById('muteBtn');
            btn.textContent = btn.textContent === '🔊' ? '🔇' : '🔊';
        }
        
        // 点击空白处取消选择
        document.getElementById('xiangqi-board').addEventListener('click', (e) => {
            if (e.target.tagName === 'svg') {
                GameState.selectedPiece = null;
                renderBoard();
            }
        });
        
        // 初始化
        document.getElementById('enterBtn').textContent = '请先选择模式';
    </script>
</body>
</html>
