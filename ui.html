<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>象棋AI - 对战界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .difficulty-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        select, button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        select {
            background: #2d3a4f;
            color: #fff;
        }
        
        button {
            background: #e94560;
            color: white;
            font-weight: 600;
        }
        
        button:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }
        
        button.secondary {
            background: #4a5568;
        }
        
        button.secondary:hover {
            background: #5a6578;
        }
        
        #board-container {
            position: relative;
            background: #d4a574;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        #xiangqi-board {
            display: grid;
            grid-template-columns: repeat(9, 50px);
            grid-template-rows: repeat(10, 50px);
            gap: 0;
            background: #d4a574;
        }
        
        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .cell:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .cell.selected {
            background: rgba(233, 69, 96, 0.4);
        }
        
        .cell.valid-move {
            background: rgba(72, 187, 120, 0.3);
        }
        
        .cell.valid-move::after {
            content: '';
            width: 12px;
            height: 12px;
            background: #48bb78;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .cell.last-move {
            background: rgba(66, 153, 225, 0.3);
        }
        
        .piece {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            user-select: none;
        }
        
        .piece:hover {
            transform: scale(1.1);
        }
        
        .piece.red {
            background: linear-gradient(145deg, #ff6b6b, #c92a2a);
            color: #ffe3e3;
            border: 2px solid #ffa8a8;
        }
        
        .piece.black {
            background: linear-gradient(145deg, #495057, #212529);
            color: #e9ecef;
            border: 2px solid #adb5bd;
        }
        
        .status-bar {
            margin-top: 15px;
            padding: 12px 24px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            text-align: center;
            max-width: 500px;
        }
        
        .status-bar .turn {
            font-size: 16px;
            font-weight: 600;
            color: #4ade80;
        }
        
        .status-bar .turn.ai-turn {
            color: #f87171;
        }
        
        .move-history {
            margin-top: 15px;
            max-width: 500px;
            width: 100%;
        }
        
        .move-history h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #94a3b8;
        }
        
        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 13px;
        }
        
        .move-tag {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .move-tag.red {
            color: #ff6b6b;
        }
        
        .move-tag.black {
            color: #adb5bd;
        }
        
        /* 棋盘线条 */
        .cell::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* 九宫格标记 */
        .cell[data-row="0"][data-col="3"]::before,
        .cell[data-row="0"][data-col="5"]::before,
        .cell[data-row="7"][data-col="3"]::before,
        .cell[data-row="7"][data-col="5"]::before {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            border-right: 2px solid #8b4513;
            border-bottom: 2px solid #8b4513;
        }
        
        .cell[data-row="2"][data-col="3"]::before,
        .cell[data-row="2"][data-col="5"]::before,
        .cell[data-row="9"][data-col="3"]::before,
        .cell[data-row="9"][data-col="5"]::before {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            border-right: 2px solid #8b4513;
            border-top: 2px solid #8b4513;
            top: 0;
        }
    </style>
</head>
<body>
    <h1>🎯 象棋AI对战</h1>
    
    <div class="game-info">
        <div class="difficulty-selector">
            <label>难度:</label>
            <select id="difficulty">
                <option value="1">入门 😊</option>
                <option value="2" selected>业余 🤔</option>
                <option value="3">高手 😤</option>
                <option value="4">大师 👑</option>
            </select>
        </div>
        <button onclick="startNewGame()">新游戏</button>
        <button class="secondary" onclick="undoMove()">悔棋</button>
    </div>
    
    <div id="board-container">
        <div id="xiangqi-board"></div>
    </div>
    
    <div class="status-bar">
        <div id="status" class="turn">点击棋子开始游戏</div>
    </div>
    
    <div class="move-history">
        <h3>走法记录</h3>
        <div id="moves-list" class="moves-list"></div>
    </div>

    <script>
        // 棋子定义
        const PIECES = {
            K: { name: '帅', type: 'king', color: 'red' },
            A: { name: '仕', type: 'advisor', color: 'red' },
            B: { name: '相', type: 'elephant', color: 'red' },
            N: { name: '傌', type: 'horse', color: 'red' },
            R: { name: '俥', type: 'rook', color: 'red' },
            C: { name: '炮', type: 'cannon', color: 'red' },
            P: { name: '兵', type: 'pawn', color: 'red' },
            k: { name: '将', type: 'king', color: 'black' },
            a: { name: '士', type: 'advisor', color: 'black' },
            b: { name: '象', type: 'elephant', color: 'black' },
            n: { name: '马', type: 'horse', color: 'black' },
            r: { name: '車', type: 'rook', color: 'black' },
            c: { name: '砲', type: 'cannon', color: 'black' },
            p: { name: '卒', type: 'pawn', color: 'black' },
        };
        
        // 初始棋盘
        const INITIAL_BOARD = [
            ['r', 'n', 'b', 'a', 'k', 'a', 'b', 'n', 'r'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', 'c', '.', '.', '.', '.', '.', 'c', '.'],
            ['p', '.', 'p', '.', 'p', '.', 'p', '.', 'p'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['P', '.', 'P', '.', 'P', '.', 'P', '.', 'P'],
            ['.', 'C', '.', '.', '.', '.', '.', 'C', '.'],
            ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['R', 'N', 'B', 'A', 'K', 'A', 'B', 'N', 'R'],
        ];
        
        let board = [];
        let selectedPiece = null;
        let currentTurn = 'red';
        let moveHistory = [];
        let validMoves = [];
        let lastMove = null;
        let isThinking = false;
        
        // 初始化棋盘
        function initBoard() {
            board = INITIAL_BOARD.map(row => [...row]);
            selectedPiece = null;
            currentTurn = 'red';
            moveHistory = [];
            validMoves = [];
            lastMove = null;
            isThinking = false;
            renderBoard();
            updateStatus('你是红方，请选择棋子');
            updateMoveHistory();
        }
        
        // 渲染棋盘
        function renderBoard() {
            const boardEl = document.getElementById('xiangqi-board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 9; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    // 添加选中状态
                    if (selectedPiece && selectedPiece.row === row && selectedPiece.col === col) {
                        cell.classList.add('selected');
                    }
                    
                    // 添加合法移动标记
                    if (validMoves.some(m => m.row === row && m.col === col)) {
                        cell.classList.add('valid-move');
                    }
                    
                    // 添加最后移动标记
                    if (lastMove && 
                        ((lastMove.from.row === row && lastMove.from.col === col) ||
                         (lastMove.to.row === row && lastMove.to.col === col))) {
                        cell.classList.add('last-move');
                    }
                    
                    const piece = board[row][col];
                    if (piece !== '.') {
                        const pieceEl = document.createElement('div');
                        pieceEl.className = `piece ${PIECES[piece].color}`;
                        pieceEl.textContent = PIECES[piece].name;
                        cell.appendChild(pieceEl);
                    }
                    
                    cell.addEventListener('click', () => onCellClick(row, col));
                    boardEl.appendChild(cell);
                }
            }
        }
        
        // 获取棋子颜色
        function getPieceColor(piece) {
            if (piece === '.') return null;
            return piece === piece.toUpperCase() ? 'red' : 'black';
        }
        
        // 获取合法移动
        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (piece === '.') return [];
            
            const moves = [];
            const pieceType = PIECES[piece].type;
            const isRed = getPieceColor(piece) === 'red';
            
            // 简化版移动规则
            if (pieceType === 'rook') {
                // 车：直线
                const directions = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of directions) {
                    let r = row + dr, c = col + dc;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = board[r][c];
                        if (target === '.') {
                            moves.push({row: r, col: c});
                        } else {
                            if (getPieceColor(target) !== getPieceColor(piece)) {
                                moves.push({row: r, col: c});
                            }
                            break;
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (pieceType === 'horse') {
                // 马：日字
                const jumps = [[-2,-1], [-2,1], [-1,-2], [-1,2], [1,-2], [1,2], [2,-1], [2,1]];
                for (const [dr, dc] of jumps) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        // 检查绊马腿
                        const blockR = row + (dr > 0 ? 1 : -1) * Math.floor(Math.abs(dr)/2);
                        const blockC = col + (dc > 0 ? 1 : -1) * Math.floor(Math.abs(dc)/2);
                        if (Math.abs(dr) === 2) {
                            if (board[row + (dr > 0 ? 1 : -1)][col] === '.') {
                                const target = board[r][c];
                                if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                    moves.push({row: r, col: c});
                                }
                            }
                        } else {
                            if (board[row][col + (dc > 0 ? 1 : -1)] === '.') {
                                const target = board[r][c];
                                if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                    moves.push({row: r, col: c});
                                }
                            }
                        }
                    }
                }
            } else if (pieceType === 'cannon') {
                // 炮：直线跳吃
                const directions = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of directions) {
                    let r = row + dr, c = col + dc;
                    let jumped = false;
                    while (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        const target = board[r][c];
                        if (!jumped) {
                            if (target === '.') {
                                moves.push({row: r, col: c});
                            } else {
                                jumped = true;
                            }
                        } else {
                            if (target !== '.') {
                                if (getPieceColor(target) !== getPieceColor(piece)) {
                                    moves.push({row: r, col: c});
                                }
                                break;
                            }
                        }
                        r += dr; c += dc;
                    }
                }
            } else if (pieceType === 'pawn') {
                // 兵/卒
                const direction = isRed ? -1 : 1;
                const r = row + direction;
                if (r >= 0 && r < 10) {
                    const target = board[r][col];
                    if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                        moves.push({row: r, col: c});
                    }
                }
                // 过河后可横走
                const crossed = isRed ? row <= 4 : row >= 5;
                if (crossed) {
                    for (const dc of [-1, 1]) {
                        const c = col + dc;
                        if (c >= 0 && c < 9) {
                            const target = board[row][c];
                            if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                                moves.push({row, col: c});
                            }
                        }
                    }
                }
            }
            // 其他棋子规则简化，添加基础移动
            else {
                // 简化的移动规则
                const offsets = pieceType === 'king' ? [[-1,0], [1,0], [0,-1], [0,1]] :
                               pieceType === 'advisor' ? [[-1,-1], [-1,1], [1,-1], [1,1]] :
                               pieceType === 'elephant' ? [[-2,-2], [-2,2], [2,-2], [2,2]] : [];
                
                for (const [dr, dc] of offsets) {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 10 && c >= 0 && c < 9) {
                        // 九宫格限制
                        if (pieceType === 'king' || pieceType === 'advisor') {
                            const palaceRow = isRed ? r >= 7 : r <= 2;
                            const palaceCol = c >= 3 && c <= 5;
                            if (!palaceRow || !palaceCol) continue;
                        }
                        // 象不能过河
                        if (pieceType === 'elephant') {
                            if (isRed && r < 5) continue;
                            if (!isRed && r > 4) continue;
                            // 检查象眼
                            if (board[row + dr/2][col + dc/2] !== '.') continue;
                        }
                        
                        const target = board[r][c];
                        if (target === '.' || getPieceColor(target) !== getPieceColor(piece)) {
                            moves.push({row: r, col: c});
                        }
                    }
                }
            }
            
            return moves;
        }
        
        // 点击格子
        function onCellClick(row, col) {
            if (isThinking || currentTurn !== 'red') return;
            
            const piece = board[row][col];
            
            // 如果已选中棋子
            if (selectedPiece) {
                // 点击了合法目标位置
                if (validMoves.some(m => m.row === row && m.col === col)) {
                    makeMove(selectedPiece.row, selectedPiece.col, row, col);
                    selectedPiece = null;
                    validMoves = [];
                    renderBoard();
                    return;
                }
                
                // 点击了另一个自己的棋子
                if (piece !== '.' && getPieceColor(piece) === 'red') {
                    selectedPiece = {row, col};
                    validMoves = getValidMoves(row, col);
                    renderBoard();
                    return;
                }
                
                // 取消选择
                selectedPiece = null;
                validMoves = [];
                renderBoard();
                return;
            }
            
            // 选择自己的棋子
            if (piece !== '.' && getPieceColor(piece) === 'red') {
                selectedPiece = {row, col};
                validMoves = getValidMoves(row, col);
                renderBoard();
            }
        }
        
        // 执行移动
        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const captured = board[toRow][toCol];
            
            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = '.';
            
            lastMove = {from: {row: fromRow, col: fromCol}, to: {row: toRow, col: toCol}};
            
            // 记录走法
            const moveStr = `${piece}:${fromCol}${fromRow}-${toCol}${toRow}`;
            moveHistory.push({
                piece: piece,
                from: {row: fromRow, col: fromCol},
                to: {row: toRow, col: toCol},
                captured: captured
            });
            
            updateMoveHistory();
            
            // 检查是否吃掉将/帅
            if (captured.toLowerCase() === 'k') {
                renderBoard();
                setTimeout(() => {
                    alert(currentTurn === 'red' ? '🎉 你赢了！' : 'AI获胜！');
                }, 100);
                return;
            }
            
            // 切换回合
            currentTurn = currentTurn === 'red' ? 'black' : 'red';
            renderBoard();
            
            if (currentTurn === 'black') {
                isThinking = true;
                updateStatus('AI思考中...', true);
                setTimeout(makeAIMove, 500);
            } else {
                updateStatus('你的回合');
            }
        }
        
        // AI走棋（简化版）
        function makeAIMove() {
            const difficulty = parseInt(document.getElementById('difficulty').value);
            const allMoves = [];
            
            // 收集所有合法移动
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 9; c++) {
                    const piece = board[r][c];
                    if (piece !== '.' && getPieceColor(piece) === 'black') {
                        const moves = getValidMoves(r, c);
                        for (const m of moves) {
                            allMoves.push({
                                from: {row: r, col: c},
                                to: m,
                                piece: piece,
                                captured: board[m.row][m.col]
                            });
                        }
                    }
                }
            }
            
            if (allMoves.length === 0) {
                updateStatus('AI无法移动，你赢了！');
                isThinking = false;
                return;
            }
            
            // 评估移动
            const scoredMoves = allMoves.map(move => {
                let score = 0;
                
                // 吃子得分
                if (move.captured !== '.') {
                    const values = {p: 10, c: 45, n: 40, r: 90, b: 20, a: 20, k: 1000};
                    score += values[move.captured.toLowerCase()] || 0;
                }
                
                // 位置评分（前进偏好）
                const direction = move.piece === move.piece.toLowerCase() ? 1 : -1;
                score += (move.to.row - move.from.row) * direction * 2;
                
                // 中心控制
                const centerDist = Math.abs(move.to.col - 4);
                score += (4 - centerDist) * 2;
                
                return {move, score};
            });
            
            // 根据难度选择移动
            scoredMoves.sort((a, b) => b.score - a.score);
            
            let selectedMove;
            if (difficulty === 1) {
                // 入门：随机选择，偏向高分
                const topMoves = scoredMoves.slice(0, Math.min(5, scoredMoves.length));
                selectedMove = topMoves[Math.floor(Math.random() * topMoves.length)].move;
            } else if (difficulty === 2) {
                // 业余：80%选最优，20%随机
                if (Math.random() < 0.8) {
                    selectedMove = scoredMoves[0].move;
                } else {
                    selectedMove = scoredMoves[Math.floor(Math.random() * Math.min(3, scoredMoves.length))].move;
                }
            } else {
                // 高手/大师：始终选最优
                selectedMove = scoredMoves[0].move;
            }
            
            // 执行AI移动
            board[selectedMove.to.row][selectedMove.to.col] = selectedMove.piece;
            board[selectedMove.from.row][selectedMove.from.col] = '.';
            
            lastMove = {from: selectedMove.from, to: selectedMove.to};
            
            moveHistory.push({
                piece: selectedMove.piece,
                from: selectedMove.from,
                to: selectedMove.to,
                captured: selectedMove.captured
            });
            
            updateMoveHistory();
            
            // 检查游戏结束
            if (selectedMove.captured.toLowerCase() === 'k') {
                renderBoard();
                setTimeout(() => alert('AI获胜！'), 100);
                isThinking = false;
                return;
            }
            
            currentTurn = 'red';
            isThinking = false;
            renderBoard();
            updateStatus('你的回合');
        }
        
        // 更新状态
        function updateStatus(text, isAI = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = isAI ? 'turn ai-turn' : 'turn';
        }
        
        // 更新走法历史
        function updateMoveHistory() {
            const listEl = document.getElementById('moves-list');
            listEl.innerHTML = '';
            
            moveHistory.forEach((move, index) => {
                const tag = document.createElement('span');
                tag.className = `move-tag ${PIECES[move.piece].color}`;
                const colNames = 'abcdefghi';
                tag.textContent = `${index + 1}. ${PIECES[move.piece].name}${colNames[move.from.col]}${move.from.row}-${colNames[move.to.col]}${move.to.row}`;
                listEl.appendChild(tag);
            });
            
            // 滚动到最新
            listEl.scrollLeft = listEl.scrollWidth;
        }
        
        // 新游戏
        function startNewGame() {
            initBoard();
        }
        
        // 悔棋
        function undoMove() {
            if (moveHistory.length < 2 || isThinking) return;
            
            // 撤销AI和玩家的各一步
            for (let i = 0; i < 2 && moveHistory.length > 0; i++) {
                const move = moveHistory.pop();
                board[move.from.row][move.from.col] = move.piece;
                board[move.to.row][move.to.col] = move.captured || '.';
            }
            
            currentTurn = 'red';
            selectedPiece = null;
            validMoves = [];
            lastMove = moveHistory.length > 0 ? {
                from: moveHistory[moveHistory.length - 1].from,
                to: moveHistory[moveHistory.length - 1].to
            } : null;
            
            renderBoard();
            updateStatus('你的回合');
            updateMoveHistory();
        }
        
        // 初始化
        initBoard();
    </script>
