<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国象棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a3a52,#2d5a7b);min-height:100vh;overflow:hidden}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.6;background:radial-gradient(ellipse 600px 300px at 20% 100%,rgba(100,130,150,.3),transparent)}
.container{position:relative;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column}
.page{display:none;width:100%;height:100%}
.page.active{display:flex}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:rgba(0,0,0,.3)}
.game-title{font-size:24px;color:#ffd700}
.player-info{display:flex;gap:30px;align-items:center}
.player{display:flex;align-items:center;gap:10px;padding:8px 15px;border-radius:8px;background:rgba(255,255,255,.1)}
.player.active{border:2px solid #ffd700;box-shadow:0 0 15px rgba(255,215,0,.4)}
.player-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px}
.player-red .player-avatar{background:linear-gradient(145deg,#ff4444,#cc0000);color:white}
.player-black .player-avatar{background:linear-gradient(145deg,#444,#000);color:white}
.mute-btn{background:none;border:none;font-size:24px;cursor:pointer;color:#fff}
.status-bar{text-align:center;padding:8px;background:rgba(0,0,0,.2);color:#ffd700}
.game-content{flex:1;display:flex;justify-content:center;align-items:center}
.board-container{background:linear-gradient(145deg,#d4a574,#c19664);padding:15px;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5);border:3px solid #8b4513}
.piece{cursor:pointer;transition:.2s;filter:drop-shadow(0 4px 6px rgba(0,0,0,.4))}
.piece:hover{filter:drop-shadow(0 6px 12px rgba(0,0,0,.5)) brightness(1.1);transform:scale(1.05)}
.piece.selected{filter:drop-shadow(0 0 20px #ffd700) brightness(1.2);transform:scale(1.08)}
.home-page{flex-direction:column;justify-content:center;align-items:center;gap:30px}
.home-title{font-size:56px;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.6);letter-spacing:20px}
.mode-buttons{display:flex;gap:40px}
.mode-btn{width:200px;height:260px;background:rgba(255,255,255,.1);border:2px solid rgba(255,215,0,.3);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;cursor:pointer;transition:.3s;color:#fff}
.mode-btn:hover{transform:translateY(-10px);border-color:#ffd700;box-shadow:0 20px 40px rgba(0,0,0,.4)}
.room-page{flex-direction:column;justify-content:center;align-items:center}
.room-panel{background:rgba(0,0,0,.4);padding:40px;border-radius:20px;border:1px solid rgba(255,215,0,.2);min-width:400px}
.room-panel h2{color:#ffd700;text-align:center;margin-bottom:30px}
.input-group{margin-bottom:20px}
.input-group label{display:block;color:#aaa;margin-bottom:8px}
.input-group input,.input-group select{width:100%;padding:12px;border:1px solid rgba(255,215,0,.3);border-radius:8px;background:rgba(0,0,0,.3);color:#fff}
.btn{padding:12px 30px;border:none;border-radius:8px;font-size:16px;cursor:pointer;transition:.3s}
.btn-primary{background:linear-gradient(145deg,#ffd700,#ffb700);color:#333;font-weight:bold}
.btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3)}
.control-panel{display:flex;justify-content:center;gap:15px;padding:15px;background:rgba(0,0,0,.3)}
@media(max-width:768px){.home-title{font-size:36px}.mode-buttons{flex-direction:column}.room-panel{min-width:300px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">

<div class="page home-page active" id="homePage">
<div class="home-title">中国象棋</div>
<div class="mode-buttons">
<div class="mode-btn" onclick="showAI()"><div style="font-size:60px">🤖</div><h3>人机对战</h3></div>
<div class="mode-btn" onclick="showRoom()"><div style="font-size:60px">👥</div><h3>人人对战</h3></div>
</div>
</div>

<div class="page room-page" id="aiPage">
<div class="room-panel">
<h2>人机对战</h2>
<div class="input-group"><label>难度</label><select id="aiDiff"><option value="1">入门</option><option value="2" selected>业余</option><option value="3">高手</option><option value="4">大师</option></select></div>
<div class="input-group"><label>昵称</label><input type="text" id="aiName" value="玩家"></div>
<div style="display:flex;gap:15px;justify-content:center">
<button class="btn btn-secondary" onclick="showHome()">返回</button>
<button class="btn btn-primary" onclick="startAI()">开始</button>
</div>
</div>
</div>

<div class="page room-page" id="roomPage">
<div class="room-panel">
<h2>人人对战</h2>
<div class="input-group"><label>昵称</label><input type="text" id="pName" value="玩家"></div>
<div class="input-group"><label>房间名</label><input type="text" id="rName" placeholder="输入房间名"></div>
<div style="display:flex;gap:15px;justify-content:center;margin-bottom:20px">
<button class="btn btn-secondary" onclick="showHome()">返回</button>
<button class="btn btn-primary" onclick="createRoom()">创建房间</button>
</div>
<label style="color:#aaa">加入房间</label>
<div style="max-height:200px;overflow-y:auto;background:rgba(0,0,0,.2);border-radius:8px;padding:10px" id="rList"></div>
</div>
</div>

<div class="page" id="gamePage" style="flex-direction:column">
<div class="top-bar">
<div class="game-title">中国象棋</div>
<div class="player-info">
<div class="player player-red" id="redP"><div class="player-avatar">红</div><span id="rNameDisp">红方</span></div>
<div style="color:#666">VS</div>
<div class="player player-black" id="blackP"><div class="player-avatar">黑</div><span id="bNameDisp">黑方</span></div>
</div>
<button class="mute-btn" onclick="toggleMute()">🔊</button>
</div>
<div class="status-bar" id="status">红方回合</div>
<div class="game-content">
<div class="board-container">
<svg id="board" width="600" height="750" viewBox="0 0 600 750">
<defs>
<radialGradient id="redG" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="40%" stop-color="#ee5a5a"/><stop offset="100%" stop-color="#c92a2a"/></radialGradient>
<radialGradient id="blackG" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#666"/><stop offset="40%" stop-color="#444"/><stop offset="100%" stop-color="#222"/></radialGradient>
</defs>
<rect x="20" y="20" width="560" height="710" fill="#e8c595" rx="5"/>
<g id="grid" stroke="#333" stroke-width="1.5"></g>
<g stroke="#333" stroke-width="1.5">
<line x1="220" y1="20" x2="380" y2="180"/><line x1="380" y1="20" x2="220" y2="180"/>
<line x1="220" y1="730" x2="380" y2="570"/><line x1="380" y1="730" x2="220" y2="570"/>
</g>
<text x="300" y="385" text-anchor="middle" font-size="32" font-family="KaiTi" fill="#8b4513" opacity="0.7">楚 河</text>
<text x="300" y="425" text-anchor="middle" font-size="32" font-family="KaiTi" fill="#8b4513" opacity="0.7">汉 界</text>
<g id="pieces"></g>
</svg>
</div>
</div>
<div class="control-panel">
<select id="diffSel" onchange="changeDiff()" style="padding:10px;border-radius:8px;background:rgba(0,0,0,.3);color:#fff;border:1px solid rgba(255,215,0,.3)"><option value="1">入门</option><option value="2" selected>业余</option><option value="3">高手</option><option value="4">大师</option></select>
<button class="btn btn-secondary" onclick="undo()">悔棋</button>
<button class="btn btn-secondary" onclick="restart()">新局</button>
<button class="btn btn-secondary" onclick="exit()">退出</button>
</div>
</div>

</div>

<script>
const GS={mode:null,board:[],sel:null,turn:'red',over:false,diff:2,muted:false,rid:null,pname:'',host:false,hist:[]};
const PN={R:'車',N:'馬',B:'相',A:'仕',K:'帥',C:'炮',P:'兵',r:'車',n:'馬',b:'象',a:'士',k:'將',c:'砲',p:'卒'};
const GX=[40,110,180,250,320,390,460,530,600],GY=[35,105,175,245,315,435,505,575,645,715],PR=28;

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='roomPage')updateRList();}
function showHome(){showPage('homePage');}
function showAI(){showPage('aiPage');}
function showRoom(){showPage('roomPage');}
function toggleMute(){GS.muted=!GS.muted;document.querySelector('.mute-btn').textContent=GS.muted?'🔇':'🔊';}
function getR(){return JSON.parse(localStorage.getItem('xq')||'[]');}
function saveR(r){localStorage.setItem('xq',JSON.stringify(r));}

function createRoom(){
const n=document.getElementById('pName').value.trim(),rn=document.getElementById('rName').value.trim();
if(!n||!rn){alert('请输入昵称和房间名');return;}
GS.pname=n;GS.mode='pvp';GS.host=true;GS.rid=Date.now().toString();
const rs=getR();rs.push({id:GS.rid,name:rn,host:n,status:'waiting',t:Date.now()});saveR(rs);
document.getElementById('rNameDisp').textContent=n;document.getElementById('bNameDisp').textContent='等待加入...';
document.getElementById('diffSel').style.display='none';showPage('gamePage');init();
}

function joinRoom(id){
const n=document.getElementById('pName').value.trim();if(!n){alert('请输入昵称');return;}
GS.pname=n;GS.mode='pvp';GS.host=false;GS.rid=id;
const rs=getR(),r=rs.find(x=>x.id===id);
if(r){r.status='playing';r.guest=n;saveR(rs);document.getElementById('rNameDisp').textContent=r.host;document.getElementById('bNameDisp').textContent=n;document.getElementById('diffSel').style.display='none';showPage('gamePage');init();}
}

function updateRList(){
const rl=document.getElementById('rList'),rs=getR().filter(r=>r.status==='waiting');
rl.innerHTML=rs.length?rs.map(r=>`<div onclick="joinRoom('${r.id}')" style="display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer"><span style="color:#fff">${r.name}</span><span style="color:#4caf50">${r.host}</span></div>`).join(''):'<div style="color:#666;text-align:center;padding:20px">暂无房间</div>';
}

function startAI(){
const n=document.getElementById('aiName').value.trim()||'玩家';
GS.pname=n;GS.mode='ai';GS.diff=parseInt(document.getElementById('aiDiff').value);GS.host=true;
document.getElementById('rNameDisp').textContent=n;document.getElementById('bNameDisp').textContent='电脑';
document.getElementById('diffSel').style.display='block';document.getElementById('diffSel').value=GS.diff;
showPage('gamePage');init();
}
function changeDiff(){GS.diff=parseInt(document.getElementById('diffSel').value);}

function drawGrid(){
const g=document.getElementById('grid');g.innerHTML='';
for(let i=0;i<10;i++){const y=GY[i],l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',GX[0]);l.setAttribute('y1',y);l.setAttribute('x2',GX[4]);l.setAttribute('y2',y);g.appendChild(l);const r=document.createElementNS('http://www.w3.org/2000/svg','line');r.setAttribute('x1',GX[4]);r.setAttribute('y1',y);r.setAttribute('x2',GX[8]);r.setAttribute('y2',y);g.appendChild(r);}
for(let i=0;i<9;i++){const x=GX[i],t=document.createElementNS('http://www.w3.org/2000/svg','line');t.setAttribute('x1',x);t.setAttribute('y1',GY[0]);t.setAttribute('x2',x);t.setAttribute('y2',GY[4]);g.appendChild(t);const b=document.createElementNS('http://www.w3.org/2000/svg','line');b.setAttribute('x1',x);b.setAttribute('y1',GY[5]);b.setAttribute('x2',x);b.setAttribute('y2',GY[9]);g.appendChild(b);}
}

function createP(p,r,c){
const isR=p===p.toUpperCase(),cx=GX[c],cy=GY[r];
const g=document.createElementNS('http://www.w3.org/2000/svg','g');
g.setAttribute('class','piece');g.setAttribute('transform',`translate(${cx},${cy})`);
if(GS.sel&&GS.sel.r===r&&GS.sel.c===c)g.classList.add('selected');
const s=document.createElementNS('http://www.w3.org/2000/svg','circle');s.setAttribute('r',PR-2);s.setAttribute('fill','rgba(0,0,0,0.3)');s.setAttribute('transform','translate(2,3)');g.appendChild(s);
const cir=document.createElementNS('http://www.w3.org/2000/svg','circle');cir.setAttribute('r',PR);cir.setAttribute('fill',isR?'url(#redG)':'url(#blackG)');cir.setAttribute('stroke',isR?'#a03030':'#222');cir.setAttribute('stroke-width','2');g.appendChild(cir);
const h=document.createElementNS('http://www.w3.org/2000/svg','ellipse');h.setAttribute('cx',-8);h.setAttribute('cy',-8);h.setAttribute('rx',10);h.setAttribute('ry',7);h.setAttribute('fill','rgba(255,255,255,0.4)');g.appendChild(h);
const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('y',6);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','22');t.setAttribute('font-family','KaiTi');t.setAttribute('font-weight','bold');t.setAttribute('fill','#fff');t.textContent=PN[p];g.appendChild(t);
g.onclick=(e)=>{e.stopPropagation();onP(r,c);};
return g;
}

function render(){
const l=document.getElementById('pieces');l.innerHTML='';
for(let r=0;r<10;r++)for(let c=0;c<9;c++)if(GS.board[r][c]!=='.')l.appendChild(createP(GS.board[r][c],r,c));
}

function init(){
GS.board=[['r','n','b','a','k','a','b','n','r'],['.','.','.','.','.','.','.','.','.'],['.','c','.','.','.','.','.','c','.'],['p','.','p','.','p','.','p','.','p'],['.','.','.','.','.','.','.','.','.'],['.','.','.','.','.','.','.','.','.'],['P','.','P','.','P','.','P','.','P'],['.','C','.','.','.','.','.','C','.'],['.','.','.','.','.','.','.','.','.'],['R','N','B','A','K','A','B','N','R']];
GS.sel=null;GS.turn='red';GS.over=false;GS.hist=[];
drawGrid();render();updateS();updateH();
document.getElementById('board').onclick=onB;
}

function onP(r,c){
if(GS.over)return;if(GS.mode==='ai'&&GS.turn==='black')return;
const p=GS.board[r][c],pc=p===p.toUpperCase()?'red':'black';
if(GS.sel){const m=getM(GS.sel.r,GS.sel.c);if(m.find(x=>x.r===r&&x.c===c)){move(GS.sel.r,GS.sel.c,r,c);return;}}
if(p!=='.'&&pc===GS.turn){if(GS.mode==='pvp'){const can=(GS.host&&pc==='red')||(!GS.host&&pc==='black');if(!can)return;}GS.sel={r,c};render();}
}

function onB(e){
if(GS.over||!GS.sel)return;
const svg=document.getElementById('board'),rect=svg.getBoundingClientRect();
const sx=600/rect.width,sy=750/rect.height;
const cx=(e.clientX-rect.left)*sx,cy=(e.clientY-rect.top)*sy;
let cc=-1,cr=-1,md=9999;
for(let c=0;c<9;c++)for(let r=0;r<10;r++){const dx=cx-GX[c],dy=cy-GY[r],d=Math.sqrt(dx*dx+dy*dy);if(d<md&&d<35){md=d;cc=c;cr=r;}}
if(cc>=0&&cr>=0){const m=getM(GS.sel.r,GS.sel.c);if(m.find(x=>x.r===cr&&x.c===cc))move(GS.sel.r,GS.sel.c,cr,cc);else{GS.sel=null;render();}}else{GS.sel=null;render();}
}

function move(fr,fc,tr,tc){
const p=GS.board[fr][fc],cap=GS.board[tr][tc];
GS.hist.push({from:{r:fr,c:fc},to:{r:tr,c:tc},p,cap});
GS.board[tr][tc]=p;GS.board[fr][fc]='.';
if(cap!=='.'){if(!GS.muted){const u=new SpeechSynthesisUtterance('吃');u.lang='zh-CN';u.pitch=1.3;u.rate=0.9;u.volume=0.4;speechSynthesis.speak(u);}}
if(cap==='K'||cap==='k'){GS.over=true;setTimeout(()=>alert((cap==='K'?'黑方':'红方')+'胜利！'),100);}
GS.sel=null;GS.turn=GS.turn==='red'?'black':'red';
render();updateS();updateH();
if(GS.mode==='ai'&&GS.turn==='black'&&!GS.over)setTimeout(aiMove,500);
}

function updateS(){document.getElementById('status').textContent=GS.over?'游戏结束':(GS.turn==='red'?'红方回合':'黑方回合');}
function updateH(){document.getElementById('redP').classList.toggle('active',GS.turn==='red');document.getElementById('blackP').classList.toggle('active',GS.turn==='black');}

function aiMove(){
const pcs=[];
for(let r=0;r<10;r++)for(let c=0;c<9;c++){const p=GS.board[r][c];if(p!=='.'&&p===p.toLowerCase()){const m=getM(r,c);if(m.length)pcs.push({r,c,p,m});}}
if(!pcs.length)return;let best=null;
if(GS.diff>=3){for(const p of pcs)for(const m of p.m){const t=GS.board[m.r][m.c];if(t!=='.'){const v=val(t);if(!best||v>best.v)best={f:p,t:m,v};}}}
if(!best){const p=pcs[Math.floor(Math.random()*pcs.length)],m=p.m[Math.floor(Math.random()*p.m.length)];best={f:p,t:m,v:0};}
move(best.f.r,best.f.c,best.t.r,best.t.c);
}
function val(p){const v={K:100,k:100,R:9,r:9,C:5,c:5,N:4,n:4,B:2,b:2,A:2,a:2,P:1,p:1};return v[p]||0;}

function getM(r,c){
const p=GS.board[r][c];if(p==='.')return[];
const t=p.toLowerCase(),isR=p===p.toUpperCase(),moves=[];
const valid=(nr,nc)=>{
if(nr<0||nr>9||nc<0||nc>8)return false;
const tgt=GS.board[nr][nc];
if(tgt==='.')return true;
return(tgt===tgt.toUpperCase()?'red':'black')!==(isR?'red':'black');
};
switch(t){
case'r':for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){for(let i=1;i<10;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>9||nc<0||nc>8)break;const tgt=GS.board[nr][nc];if(tgt==='.')moves.push({r:nr,c:nc});else{if((isR&&tgt===tgt.toLowerCase())||(!isR&&tgt===tgt.toUpperCase()))moves.push({r:nr,c:nc});}break;}}break;
case'n':for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){const nr=r+dr,nc=c+dc;if(nr<0||nr>9||nc<0||nc>8)continue;const br=r+(dr>0?1:dr<0?-1:0),bc=c+(dc>0?1:dc<0?-1:0);if(Math.abs(dr)===2&&GS.board[br][c]!=='.')continue;if(Math.abs(dc)===2&&GS.board[r][bc]!=='.')continue;if(valid(nr,nc))moves.push({r:nr,c:nc});}break;
case'b':for(const[dr,dc]of[[-2,-2],[-2,2],[2,-2],[2,2]]){const nr=r+dr,nc=c+dc;if(p==='B'&&nr<5)continue;if(p==='b'&&nr>4)continue;if(nc<0||nc>8)continue;if(GS.board[r+dr/2][c+dc/2]!=='.')continue;if(valid(nr,nc))moves.push({r:nr,c:nc});}break;
case'a':for(const[dr,dc]of[[-1,-1],[-1,1],[1,-1],[1,1]]){const nr=r+dr,nc=c+dc;if(nc<3||nc>5)continue;if(p==='A'&&nr<7)continue;if(p==='a'&&nr>2)continue;if(valid(nr,nc))moves.push({r:nr,c:nc});}break;
case'k':for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc;if(nc<3||nc>5)continue;if(p==='K'&&nr<7)continue;if(p==='k'&&nr>2)continue;if(valid(nr,nc))moves.push({r:nr,c:nc});}if(c===4){let nr=r+(p==='K'?-1:1);while(nr>=0&&nr<=9){const tgt=GS.board[nr][4];if(tgt!=='.'){if((p==='K'&&tgt==='k')||(p==='k'&&tgt==='K'))moves.push({r:nr,c:4});}break;nr+=p==='K'?-1:1;}}break;
case'c':for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){let jumped=false;for(let i=1;i<10;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>9||nc<0||nc>8)break;const tgt=GS.board[nr][nc];if(!jumped){if(tgt==='.')moves.push({r:nr,c:nc});else jumped=true;}else{if(tgt!=='.'){if((isR&&tgt===tgt.toLowerCase())||(!isR&&tgt===tgt.toUpperCase()))moves.push({r:nr,c:nc});}break;}}}break;
case'p':const fwd=p==='P'?-1:1,nr=r+fwd;if(nr>=0&&nr<=9&&valid(nr,c))moves.push({r:nr,c});if((p==='P'&&r<=4)||(p==='p'&&r>=5)){for(const dc of[-1,1]){const nc=c+dc;if(nc>=0&&nc<=8&&valid(r,nc))moves.push({r,c:nc});}}break;
}
return moves;
}

function undo(){
if(!GS.hist.length)return;
if(GS.mode==='ai'&&GS.hist.length>=2){GS.hist.pop();GS.hist.pop();}else GS.hist.pop();
GS.board=[['r','n','b','a','k','a','b','n','r'],['.','.','.','.','.','.','.','.','.'],['.','c','.','.','.','.','.','c','.'],['p','.','p','.','p','.','p','.','p'],['.','.','.','.','.','.','.','.','.'],['.','.','.','.','.','.','.','.','.'],['P','.','P','.','P','.','P','.','P'],['.','C','.','.','.','.','.','C','.'],['.','.','.','.','.','.','.','.','.'],['R','N','B','A','K','A','B','N','R']];
for(const m of GS.hist){GS.board[m.to.r][m.to.c]=m.p;GS.board[m.from.r][m.from.c]='.';}
GS.turn=GS.hist.length%2===0?'red':'black';GS.over=false;GS.sel=null;
render();updateS();updateH();
}
function restart(){GS.hist=[];init();}
function exit(){
if(GS.mode==='pvp'&&GS.rid){const rs=getR(),i=rs.findIndex(r=>r.id===GS.rid);if(i>=0){rs.splice(i,1);saveR(rs);}}
GS.rid=null;GS.mode=null;showPage('homePage');
}
setInterval(()=>{const rs=getR(),v=rs.filter(r=>Date.now()-r.t<3600000);if(v.length!==rs.length)saveR(v);},60000);
